        `translate(${x}, ${y + gap}) rotate(${rotation}) scale(${scale}) translate(-${TULIP_ATTACH.x}, -${TULIP_ATTACH.y})`
    );

    const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
    group.classList.add("tulip-sway");
    group.style.animationDelay = `${Math.random() * 3}s`;

    TULIP_PATHS.forEach(({ d, fill }, i) => {
        const petal = document.createElementNS("http://www.w3.org/2000/svg", "g");
        petal.classList.add("tulip-petal");
        petal.style.animationDelay = `${stemDuration + i * 120}ms`;

        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", d);
        path.setAttribute("fill", fill);
        petal.appendChild(path);

        group.appendChild(petal);
    });

    plantAppend(mount);
    mount.appendChild(group);

    startRoseSpores(x, y, angle, stemDuration);
}

function spawnLarkspur(x, y, angle, stemDuration) {
    const gap = 8;
    const rotation = angle + 90;

    const mount = document.createElementNS("http://www.w3.org/2000/svg", "g");
    mount.setAttribute(
        "transform",
        `translate(${x}, ${y + gap}) rotate(${rotation}) scale(${getFlowerScale(1.16)})`
    );

    const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
    group.classList.add("larkspur-sway");
    group.style.animationDelay = `${Math.random() * 3}s`;

    const bloomCount = 13 + Math.floor(Math.random() * 7);

    for (let i = 0; i < bloomCount; i++) {
        const bloom = document.createElementNS("http://www.w3.org/2000/svg", "g");
        bloom.classList.add("larkspur-bloom");
        bloom.style.animationDelay = `${stemDuration + i * 55}ms`;

        const bx = random(-6, 6);
        const by = -4 - i * random(3.5, 5.5);
        const rx = random(4.5, 7);
        const ry = random(5.8, 8.5);

        const petal = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
        petal.setAttribute("cx", bx);
        petal.setAttribute("cy", by);
        petal.setAttribute("rx", rx);
        petal.setAttribute("ry", ry);
        petal.setAttribute("fill", LARKSPUR_PINKS[Math.floor(Math.random() * LARKSPUR_PINKS.length)]);
        petal.setAttribute("fill-opacity", random(0.8, 0.98));
        bloom.appendChild(petal);

        const spur = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
        spur.setAttribute("cx", bx + random(-2, 2));
        spur.setAttribute("cy", by + ry * 0.55);
        spur.setAttribute("rx", rx * 0.35);
        spur.setAttribute("ry", ry * 0.45);
        spur.setAttribute("fill", LARKSPUR_PINKS[Math.floor(Math.random() * LARKSPUR_PINKS.length)]);
        spur.setAttribute("fill-opacity", random(0.65, 0.85));
        bloom.appendChild(spur);

        group.appendChild(bloom);
    }

    plantAppend(mount);
    mount.appendChild(group);
}

function startLarkspurSpores(stemPath, stemDuration) {
    const plant = currentPlant;
    const pinkStart = 0.2;
    const pinkEnd = 0.98;
    let cancelled = false;
    const timeouts = [];

    registerSporeLoop(() => {
        cancelled = true;
        timeouts.forEach(clearTimeout);
    });

    function schedule() {
        if (cancelled || !plant.group.isConnected) return;

        const totalLen = stemPath.getTotalLength();
        const frac = random(pinkStart, pinkEnd);
        const at = totalLen * frac;
        const pt = stemPath.getPointAtLength(at);
        const before = stemPath.getPointAtLength(Math.max(0, at - 6));
        const after = stemPath.getPointAtLength(Math.min(totalLen, at + 6));
        const dx = after.x - before.x;
        const dy = after.y - before.y;
        const segLen = Math.hypot(dx, dy) || 1;
        const nx = -dy / segLen;
        const ny = dx / segLen;
        const side = randomSide();
        const outward = random(1, 14);
        const localAngle = Math.atan2(dy, dx) * 180 / Math.PI;

        emitSpore(
            pt.x + nx * side * outward,
            pt.y + ny * side * outward,
            localAngle,
            plant
        );
        timeouts.push(setTimeout(schedule, random(450, 950)));
    }

    timeouts.push(setTimeout(
        schedule,
        stemTimeForFraction(pinkStart, stemDuration) + 300
    ));
}

function spawnDaisy(x, y, angle, stemDuration) {
    const gap = 12;
    const scale = getFlowerScale(0.94);
    const rotation = angle + 90;
    const originX = DAISY_CENTER.cx;
    const originY = DAISY_CENTER.cy;
    const petalStart = stemDuration + DAISY_CENTER_GROW_MS;

    const mount = document.createElementNS("http://www.w3.org/2000/svg", "g");
    mount.setAttribute(
        "transform",
        `translate(${x}, ${y + gap}) rotate(${rotation}) scale(${scale}) translate(-${originX}, -${originY})`
    );

    const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
    group.classList.add("daisy-sway");
    group.style.animationDelay = `${Math.random() * 3}s`;

    const back = document.createElementNS("http://www.w3.org/2000/svg", "g");
    const front = document.createElementNS("http://www.w3.org/2000/svg", "g");

    DAISY_PETALS.forEach((petal, i) => {
        const petalGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");

        const ellipse = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
        ellipse.setAttribute("cx", petal.cx);
        ellipse.setAttribute("cy", petal.cy);
        ellipse.setAttribute("rx", petal.rx);
        ellipse.setAttribute("ry", petal.ry);
        ellipse.setAttribute("fill", petal.fill);
        if (petal.rotate) {
            ellipse.setAttribute(
                "transform",
                `rotate(${petal.rotate} ${petal.cx} ${petal.cy})`
            );
        }
        ellipse.classList.add("daisy-petal-glow");
        petalGroup.appendChild(ellipse);

        back.appendChild(petalGroup);
        animatePetalFromCenter(
            petalGroup,
            originX,
            originY,
            petalStart + i * 40
        );
    });

    const center = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    center.setAttribute("cx", DAISY_CENTER.cx);
    center.setAttribute("cy", DAISY_CENTER.cy);
    center.setAttribute("fill", DAISY_CENTER.fill);
    front.appendChild(center);

    animateDaisyCenter(center, stemDuration);

    group.appendChild(back);
    group.appendChild(front);

    plantAppend(mount);
    mount.appendChild(group);

    startRoseSpores(x, y, angle, stemDuration);
}

function spawnFlower(type, x, y, angle, stemDuration, stemPath) {
    if (type === "rose") {
        spawnRose(x, y, angle, stemDuration);
    } else if (type === "desert") {
        spawnDesertFlower(x, y, angle, stemDuration);
    } else if (type === "tulip") {
        spawnTulip(x, y, angle, stemDuration);
    } else if (type === "larkspur") {
        spawnLarkspur(x, y, angle, stemDuration);
        startLarkspurSpores(stemPath, stemDuration);
    } else {
        spawnDaisy(x, y, angle, stemDuration);
    }
}

function emitSpore(startX, startY, angle, plant) {
    const spore = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    spore.setAttribute("cx", startX);
    spore.setAttribute("cy", startY);
    spore.setAttribute("r", 1 + Math.random() * 1.8);
    spore.setAttribute("fill", "rgba(255, 190, 220, 0.75)");
    appendToPlant(plant, spore);

    const drift = (angle + 90) * Math.PI / 180;
    const spread = random(-40, 40) * Math.PI / 180;
    const dist = random(45, 90);
    const dx = Math.cos(drift + spread) * dist;
    const dy = Math.sin(drift + spread) * dist - random(25, 55);
    const duration = random(2.5, 4.5) * 1000;
    const start = performance.now();

    function frame(now) {
        if (!spore.isConnected) return;

        const t = Math.min(1, (now - start) / duration);
        const eased = 1 - Math.pow(1 - t, 2);
        spore.setAttribute("cx", startX + dx * eased);
        spore.setAttribute("cy", startY + dy * eased);
        spore.setAttribute("opacity", 0.75 * (1 - t));
        if (t < 1) requestAnimationFrame(frame);
        else spore.remove();
    }

    requestAnimationFrame(frame);
}

function startRoseSpores(x, y, angle, stemDuration) {
    const plant = currentPlant;
    if (!plant) return;
    const tipX = x;
    const tipY = y - random(38, 52);
    let cancelled = false;
    const timeouts = [];

    registerSporeLoop(() => {
        cancelled = true;
        timeouts.forEach(clearTimeout);
    });

    function schedule() {
        if (cancelled || !plant.group.isConnected) return;

        emitSpore(
            tipX + random(-8, 8),
            tipY + random(-5, 5),
            angle,
            plant
        );
        timeouts.push(setTimeout(schedule, random(550, 1100)));
    }

    timeouts.push(setTimeout(schedule, stemDuration + 900));
}

function randomSide() {
    return Math.random() < 0.5 ? 1 : -1;
}

function spawnGrassClump(stemPath, x, bottomY, duration, scaleX, scaleY, mirror = false) {
    const sx = mirror ? -scaleX : scaleX;

    const mount = document.createElementNS("http://www.w3.org/2000/svg", "g");
    mount.setAttribute(
        "transform",
        `translate(${x}, ${bottomY}) scale(${sx}, ${scaleY}) translate(-${GRASS_ATTACH.x}, -${GRASS_ATTACH.y})`
    );

    const clump = document.createElementNS("http://www.w3.org/2000/svg", "g");
    clump.classList.add("grass-clump");
    clump.style.animationDelay = `${random(0, duration * 0.12)}ms`;

    GRASS_PATHS.forEach(({ d, fill }) => {
        const blade = document.createElementNS("http://www.w3.org/2000/svg", "path");
        blade.setAttribute("d", d);
        blade.setAttribute("fill", fill);
        clump.appendChild(blade);
    });

    mount.appendChild(clump);
    if (stemPath.nextSibling) {
        plantInsertAfter(mount, stemPath);
    } else {
        plantAppend(mount);
    }
}

function spawnGrass(stemPath, x, bottomY, duration) {
    const scaleX = random(0.30, 0.50);
    const spacing = scaleX * GRASS_ATTACH.x * 1.68;

    [-1, 0, 1].forEach((slot) => {
        spawnGrassClump(
            stemPath,
            x + slot * spacing,
            bottomY,
            duration,
            scaleX,
            scaleX * random(0.82, 1.62),
            slot < 0
        );
    });
}

function addStemLeaf(stemPath, frac, duration, side, outward, upward, host = null) {
    const totalLen = stemPath.getTotalLength();
    const at = totalLen * frac;
    const pt = stemPath.getPointAtLength(at);
    const before = stemPath.getPointAtLength(Math.max(0, at - 4));
    const dx = pt.x - before.x;
    const dy = pt.y - before.y;
    const len = Math.hypot(dx, dy) || 1;
    const tx = dx / len;
    const ty = dy / len;
    const nx = -ty * side;
    const ny = tx * side;
    const lx = nx * outward + tx * upward;
    const ly = ny * outward + ty * upward;
    const leafAngle = Math.atan2(ly, lx) * 180 / Math.PI - 90;
    const attachX = pt.x + nx * 1.5;
    const attachY = pt.y + ny * 1.5;

    const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
    group.setAttribute(
        "transform",
        `translate(${attachX}, ${attachY}) rotate(${leafAngle})`
    );

    const leaf = document.createElementNS("http://www.w3.org/2000/svg", "path");
    leaf.setAttribute("d", "M 0 0 Q 19 19 0 48 Q -19 19 0 0");
    leaf.classList.add("leaf");
    leaf.style.animationDelay = `${duration * frac}ms`;

    group.appendChild(leaf);

    if (host) {
        host.insertBefore(group, stemPath);
    } else {
        plantInsertBefore(group, stemPath);
    }
}

function addHeavyLeaf(stemPath, frac, duration, side, bias = null) {
    const totalLen = stemPath.getTotalLength();
    const at = totalLen * frac;
    const pt = stemPath.getPointAtLength(at);
    const before = stemPath.getPointAtLength(Math.max(0, at - 4));
    const dx = pt.x - before.x;
    const dy = pt.y - before.y;
    const len = Math.hypot(dx, dy) || 1;
    const tx = dx / len;
    const ty = dy / len;
    const nx = -ty * side;
    const ny = tx * side;
    const outward = bias ? bias.outward : random(0.72, 0.95);
    const upward = bias ? bias.upward : random(0.12, 0.32);
    const lx = nx * outward + tx * upward;
    const ly = ny * outward + ty * upward;
    const leafAngle = Math.atan2(ly, lx) * 180 / Math.PI - 90;
    const attachX = pt.x + nx * 1.5;
    const attachY = pt.y + ny * 1.5;
    const leafW = bias ? random(15, 22) : random(14, 20);
    const leafLen = bias ? random(26, 40) : random(24, 38);

    const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
    group.setAttribute(
        "transform",
        `translate(${attachX}, ${attachY}) rotate(${leafAngle})`
    );

    const leaf = document.createElementNS("http://www.w3.org/2000/svg", "path");
    leaf.setAttribute(
        "d",
        `M 0 0 Q ${leafW} ${leafLen * 0.48} 0 ${leafLen} Q ${-leafW} ${leafLen * 0.48} 0 0`
    );
    leaf.classList.add("heavy-leaf");
    leaf.style.animationDelay = `${stemTimeForFraction(frac, duration) + (bias ? random(60, 140) : 0)}ms`;
    leaf.style.animationDuration = `${random(420, 580)}ms`;

    group.appendChild(leaf);

    if (stemPath.nextSibling) {
        plantInsertAfter(group, stemPath);
    } else {
        plantAppend(group);
    }
}

function spawnHeavyLeaves(stemPath, duration) {
    const pairCount = 3 + Math.floor(Math.random() * 3);
    const leafStart = 0.3;
    const leafEnd = 0.86;

    for (let i = 0; i < pairCount; i++) {
        const frac = leafStart + (i / Math.max(1, pairCount - 1)) * (leafEnd - leafStart);

        addHeavyLeaf(stemPath, frac, duration, -1);
        addHeavyLeaf(stemPath, frac, duration, 1);
    }

    const tipBias = { outward: random(0.5, 0.65), upward: random(0.55, 0.78) };
    addHeavyLeaf(stemPath, 0.97, duration, -1, tipBias);
    addHeavyLeaf(stemPath, 0.97, duration, 1, tipBias);
}

function spawnHeavyPlant(baseX, bottomY, awaySide = null) {
    const droopSide = awaySide !== null ? awaySide : randomSide();
    const heavyHeight = random(95, 140);
    const droopReach = random(48, 78);
    const tipY = bottomY - heavyHeight * random(0.68, 0.82);

    const tipX = baseX + droopSide * droopReach;

    const c1x = baseX + droopSide * random(8, 18);
    const c1y = bottomY - heavyHeight * random(0.4, 0.54);
    const c2x = baseX + droopSide * random(55, 92);
    const c2y = tipY + random(-6, 10);

    const d =
        `M ${baseX} ${bottomY}
         C ${c1x} ${c1y} ${c2x} ${c2y} ${tipX} ${tipY}`;

    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", d);
    path.classList.add("stem");

    plantAppend(path);

    const length = path.getTotalLength();
    const duration = Math.min(2200, Math.max(1100, length * 4.5));

    path.style.setProperty("--length", length);
    path.style.setProperty("--duration", duration + "ms");

    spawnHeavyLeaves(path, duration);

    path.addEventListener(
        "animationend",
        () => {
            path.style.strokeDasharray = "none";
            path.style.strokeDashoffset = "0";
            path.style.animation = "none";
        },
        { once: true }
    );
}

function addTulipBlade(stemPath, frac, duration, side, bladeLength, tilt, bulge, width) {
    const totalLen = stemPath.getTotalLength();
    const at = totalLen * frac;
    const pt = stemPath.getPointAtLength(at);
    const ahead = stemPath.getPointAtLength(Math.min(totalLen, at + 8));
    const dx = ahead.x - pt.x;
    const dy = ahead.y - pt.y;
    const len = Math.hypot(dx, dy) || 1;
    const tx = dx / len;
    const ty = dy / len;
    const nx = -ty * side;
    const ny = tx * side;
    const inset = random(0, 0.55);
    const attachX = pt.x + nx * inset;
    const attachY = pt.y + ny * inset;
    const bladeAngle =
        Math.atan2(dx, dy) * 180 / Math.PI + tilt * side;

    const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
    group.setAttribute(
        "transform",
        `translate(${attachX}, ${attachY}) rotate(${bladeAngle})`
    );

    const stemHalf = width / 2;
    const bowAmt = Math.min(bulge, bladeLength * 0.058) * side;
    const midH = bladeLength * 0.4;
    const blade = document.createElementNS("http://www.w3.org/2000/svg", "path");
    blade.setAttribute(
        "d",
        `M ${-stemHalf} 0 L ${stemHalf} 0 Q ${bowAmt} ${midH} 0 ${bladeLength} Q ${-bowAmt * 0.62} ${midH} ${-stemHalf} 0 Z`
    );
    blade.classList.add("tulip-blade");
    blade.style.animationDelay = `${stemTimeForFraction(frac, duration)}ms`;
    blade.style.animationDuration = `${random(750, 1050)}ms`;

    group.appendChild(blade);
    plantInsertBefore(group, stemPath);
}

function spawnTulipLeaves(stemPath, duration) {
    const totalLen = stemPath.getTotalLength();
    const stemFactor = Math.min(1, totalLen / 300);
    const tallSide = randomSide();
    const leafCount = Math.random() < 0.5 ? 1 : 2;

    function addLeaf(frac, side, tall) {
        const reach = totalLen * (1 - frac);
        const length = (tall
            ? Math.min(
                reach + random(4, 14) * stemFactor,
                totalLen * 0.92
            )
            : Math.min(reach * random(0.38, 0.65), totalLen * 0.5)) * 1.22;

        addTulipBlade(
            stemPath,
            frac,
            duration,
            side,
            length,
            random(0, 0.2) * stemFactor,
            random(2.5, 4.8) * (0.5 + stemFactor * 0.5),
            random(5.8, 7.2)
        );
    }

    if (leafCount === 1) {
        addLeaf(random(0.07, 0.22), tallSide, true);
        return;
    }

    const bothTall = Math.random() < 0.3;
    addLeaf(random(0.07, 0.2), tallSide, true);
    addLeaf(
        random(0.3, 0.55),
        bothTall ? randomSide() : -tallSide,
        bothTall
    );
}

function addLarkspurLeaf(stemPath, frac, duration, side, color) {
    const totalLen = stemPath.getTotalLength();
    const at = totalLen * frac;
    const pt = stemPath.getPointAtLength(at);
    const before = stemPath.getPointAtLength(Math.max(0, at - 6));
    const after = stemPath.getPointAtLength(Math.min(totalLen, at + 6));
    const dx = after.x - before.x;
    const dy = after.y - before.y;
    const len = Math.hypot(dx, dy) || 1;
    const tx = dx / len;
    const ty = dy / len;
    const nx = -ty * side;
    const ny = tx * side;
    const outward = random(0.55, 0.85);
    const upward = random(0.2, 0.48);
    const lx = nx * outward + tx * upward;
    const ly = ny * outward + ty * upward;
    const leafAngle =
        Math.atan2(ly, lx) * 180 / Math.PI - 90 + random(-8, 8);
    const attachX = pt.x + nx * random(0.4, 1.4);
    const attachY = pt.y + ny * random(0.4, 1.4);

    const leafLen = random(15, 34);
    const leafW = random(8, 16);

    const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
    group.setAttribute(
        "transform",
        `translate(${attachX}, ${attachY}) rotate(${leafAngle})`
    );

    const leaf = document.createElementNS("http://www.w3.org/2000/svg", "path");
    leaf.setAttribute(
        "d",
        `M 0 0 Q ${leafW} ${leafLen * 0.48} 0 ${leafLen} Q ${-leafW} ${leafLen * 0.48} 0 0`
    );
    leaf.setAttribute("fill", color);
    leaf.setAttribute("fill-opacity", random(0.72, 0.96));
    leaf.classList.add("larkspur-leaf");
    leaf.style.animationDelay = `${stemTimeForFraction(frac, duration)}ms`;
    leaf.style.animationDuration = `${random(380, 620)}ms`;

    group.appendChild(leaf);

    if (stemPath.nextSibling) {
        plantInsertAfter(group, stemPath);
    } else {
        plantAppend(group);
    }
}

function spawnLarkspurLeaves(stemPath, duration) {
    const totalLen = stemPath.getTotalLength();
    const startFrac = 0.2;
    const endFrac = 0.98;
    const spanLen = totalLen * (endFrac - startFrac);
    const count = Math.max(30, Math.floor(spanLen / random(4, 7)));

    for (let i = 0; i < count; i++) {
        const t = i / Math.max(1, count - 1);
        const frac = startFrac + t * (endFrac - startFrac) + random(-0.006, 0.006);

        for (const side of [-1, 1]) {
            const color = LARKSPUR_PINKS[Math.floor(Math.random() * LARKSPUR_PINKS.length)];
            addLarkspurLeaf(
                stemPath,
                frac + random(-0.004, 0.004),
                duration,
                side,
                color
            );
        }

        if (Math.random() < 0.4) {
            addLarkspurLeaf(
                stemPath,
                frac + random(-0.01, 0.01),
                duration,
                randomSide(),
                LARKSPUR_PINKS[Math.floor(Math.random() * LARKSPUR_PINKS.length)]
            );
        }
    }
}

function spawnLeaves(stemPath, stemHeight, duration, host = null) {
    const count = stemHeight < 280 ? 2 : 3;
    const fractions = count === 2 ? [0.38, 0.64] : [0.3, 0.52, 0.72];

    fractions.forEach((frac) => {
        addStemLeaf(
            stemPath,
            frac,
            duration,
            randomSide(),
            random(0.6, 0.8),
            random(0.4, 0.55),
            host
        );
    });

    addStemLeaf(
        stemPath,
        0.88,
        duration,
        randomSide(),
        0.65,
        0.45,
        host
    );
}

function random(min,max){
    return Math.random()*(max-min)+min;
}

function easeInOut(t) {
    return t < 0.5
        ? 2 * t * t
        : 1 - Math.pow(-2 * t + 2, 2) / 2;
}

function stemTimeForFraction(frac, duration) {
    if (frac <= 0) return 0;
    if (frac >= 1) return duration;

    let lo = 0;
    let hi = 1;

    for (let i = 0; i < 24; i++) {
        const mid = (lo + hi) / 2;
        if (easeInOut(mid) < frac) lo = mid;
        else hi = mid;
    }

    return duration * ((lo + hi) / 2);
}

function finalizeStem(path) {
    path.addEventListener(
        "animationend",
        () => {
            path.style.strokeDasharray = "none";
            path.style.strokeDashoffset = "0";
            path.style.animation = "none";
        },
        { once: true }
    );
}

function growStemFromBase(baseX, bottomY, tipX, tipY, flowerType, withGrass, bendAwaySign = null) {
    const stemHeight = bottomY - tipY;
    const bendDirection =
        bendAwaySign !== null
            ? bendAwaySign
            : Math.random() > 0.5
              ? 1
              : -1;
    const bendAmount =
        random(stemHeight * 0.06, stemHeight * 0.14)
        * bendDirection;
    const controlY = (bottomY + tipY) * 0.5;

    const d =
        `M ${baseX} ${bottomY}
         Q ${baseX + bendAmount} ${controlY}
         ${tipX} ${tipY}`;

    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", d);
    path.classList.add("stem");
    plantAppend(path);

    const length = path.getTotalLength();
    const duration =
        Math.min(
            5000,
            Math.max(
                2200,
                length * 3
            )
        );

    if (withGrass) {
        spawnGrass(path, baseX, bottomY, duration);
    }

    path.style.setProperty("--length", length);
    path.style.setProperty("--duration", duration + "ms");

    const stemAngle = getStemAngleFromCurve(tipY, controlY, bendAmount);

    if (flowerType === "tulip") {
        spawnTulipLeaves(path, duration);
    } else if (flowerType === "larkspur") {
        spawnLarkspurLeaves(path, duration);
    } else {
        spawnLeaves(path, stemHeight, duration);
    }

    spawnFlower(flowerType, tipX, tipY, stemAngle, duration, path);
    finalizeStem(path);
}

function createStem(x, y, options = {}) {
    const targetSvg = options.svg || svg;
    const bottomY = getAppViewport().height;
    beginPlant(x, bottomY, targetSvg);

    const flowerType = pickFlowerType();
    const hasHeavy = Math.random() < 0.2;

    if (hasHeavy) {
        spawnHeavyPlant(x, bottomY);
    }

    growStemFromBase(x, bottomY, x, y, flowerType, true);

    if (flowerType === "tulip" && Math.random() < 0.1) {
        const dupTipX = x + random(-24, 24);
        const dupTipY = Math.max(
            80,
            Math.min(y + random(-40, 30), bottomY - 90)
        );
        growStemFromBase(x, bottomY, dupTipX, dupTipY, flowerType, false);
    }

    endPlant();
}

function getLetterWheelDelta(delta, deltaMode, axisSize) {
    if (deltaMode === 1) return delta * 16;
    if (deltaMode === 2) return delta * axisSize;
    return delta;
}

function scrollLetterCardHost(host, deltaX, deltaY) {
    if (!host) return false;

    let scrolled = false;

    if (deltaY && host.scrollHeight > host.clientHeight) {
        host.scrollTop += deltaY;
        scrolled = true;
    }

    if (deltaX && host.scrollWidth > host.clientWidth) {
        host.scrollLeft += deltaX;
        scrolled = true;
    }

    if (scrolled) updateLetterCardFades(host);
    return scrolled;
}

function canLetterCardHostScroll(host) {
    return (
        host.classList.contains("is-visible") &&
        (host.scrollHeight > host.clientHeight + 1 ||
            host.scrollWidth > host.clientWidth + 1)
    );
}

function getLetterCardTextHostAt(clientX, clientY) {
    const host = document.querySelector(".letter-card-text-host.is-visible");
    if (!host) return null;

    const rect = host.getBoundingClientRect();
    if (
        clientX < rect.left ||
        clientX > rect.right ||
        clientY < rect.top ||
        clientY > rect.bottom
    ) {
        return null;
    }

    return host;
}

function isLetterScrollInteractiveTarget(target) {
    if (!(target instanceof Element)) return false;
    return Boolean(target.closest("button, a, input, textarea, select, label"));
}

function setupLetterCardDragScroll(host) {
    let dragging = false;
    let startX = 0;
    let startY = 0;
    let startScrollLeft = 0;
    let startScrollTop = 0;
    let activePointerId = null;

    const endDrag = (e) => {
        if (!dragging || e.pointerId !== activePointerId) return;
        dragging = false;
        activePointerId = null;
        host.classList.remove("is-drag-scrolling");
        if (host.hasPointerCapture(e.pointerId)) {
            host.releasePointerCapture(e.pointerId);
        }
    };

    host.addEventListener(
        "pointerdown",
        (e) => {
            if (!canLetterCardHostScroll(host) || e.button !== 0 || isLetterScrollInteractiveTarget(e.target)) {
                return;
            }

            dragging = true;
            activePointerId = e.pointerId;
            startX = e.clientX;
            startY = e.clientY;
            startScrollLeft = host.scrollLeft;
            startScrollTop = host.scrollTop;
            host.classList.add("is-drag-scrolling");
            host.setPointerCapture(e.pointerId);
            e.preventDefault();
        },
        { passive: false }
    );

    host.addEventListener(
        "pointermove",
        (e) => {
            if (!dragging || e.pointerId !== activePointerId) return;
            host.scrollLeft = startScrollLeft - (e.clientX - startX);
            host.scrollTop = startScrollTop - (e.clientY - startY);
            updateLetterCardFades(host);
            e.preventDefault();
        },
        { passive: false }
    );

    host.addEventListener("pointerup", endDrag);
    host.addEventListener("pointercancel", endDrag);
}

function setupLetterCardGlobalWheelScroll() {
    if (document.documentElement.dataset.letterWheelReady === "1") return;
    document.documentElement.dataset.letterWheelReady = "1";

    document.addEventListener(
        "wheel",
        (e) => {
            const host = getLetterCardTextHostAt(e.clientX, e.clientY);
            if (!host) return;

            const deltaX = getLetterWheelDelta(e.deltaX, e.deltaMode, host.clientWidth);
            const deltaY = getLetterWheelDelta(e.deltaY, e.deltaMode, host.clientHeight);
            if (!scrollLetterCardHost(host, deltaX, deltaY)) return;

            e.preventDefault();
            e.stopPropagation();
        },
        { passive: false, capture: true }
    );
}

function updateLetterCardFades(scroller) {
    if (!scroller) return;

    const fadeEdge = 28;
    const maxScroll = scroller.scrollHeight - scroller.clientHeight;

    if (maxScroll <= 0) {
        scroller.style.setProperty("--fade-top", "0px");
        scroller.style.setProperty("--fade-bottom", "0px");
        return;
    }

    const topFade = Math.min(fadeEdge, scroller.scrollTop);
    const bottomFade = Math.min(fadeEdge, maxScroll - scroller.scrollTop);

    scroller.style.setProperty("--fade-top", `${topFade}px`);
    scroller.style.setProperty("--fade-bottom", `${bottomFade}px`);
}

function animateLetterText(container, paragraphSources) {
    let delay = 0.08;
    const step = 0.017;
    const paragraphPause = 0.22;
    const paragraphs = Array.from(container.querySelectorAll("p"));

    return paragraphs.reduce((chain, p, paragraphIndex) => {
        return chain.then(
            () =>
                new Promise((resolve) => {
                    const words = (paragraphSources[paragraphIndex] || "").split(/\s+/).filter(Boolean);

                    words.forEach((word, index) => {
                        if (index > 0) {
                            const space = document.createElement("span");
                            space.className = "letter-space";
                            space.style.animationDelay = `${delay}s`;
                            delay += step;
                            p.appendChild(space);
                        }

                        const wordWrap = document.createElement("span");
                        wordWrap.className = "letter-word";

                        for (const char of word) {
                            const span = document.createElement("span");
                            span.className = "letter-char";
                            span.textContent = char;
                            span.style.animationDelay = `${delay}s`;
                            delay += step;
                            wordWrap.appendChild(span);
                        }

                        p.appendChild(wordWrap);
                    });

                    if (paragraphIndex < paragraphs.length - 1) {
                        delay += paragraphPause;
                    }

                    requestAnimationFrame(resolve);
                })
        );
    }, Promise.resolve()).then(() => {
        const tailMs = delay * 1000 + 300;
        return new Promise((resolve) => setTimeout(resolve, tailMs));
    });
}

function animateSingleLetterParagraph(p, text) {
    let delay = 0.08;
    const step = 0.017;

    return new Promise((resolve) => {
        const words = text.split(/\s+/).filter(Boolean);

        words.forEach((word, index) => {
            if (index > 0) {
                const space = document.createElement("span");
                space.className = "letter-space";
                space.style.animationDelay = `${delay}s`;
                delay += step;
                p.appendChild(space);
            }

            const wordWrap = document.createElement("span");
            wordWrap.className = "letter-word";

            for (const char of word) {
                const span = document.createElement("span");
                span.className = "letter-char";
                span.textContent = char;
                span.style.animationDelay = `${delay}s`;
                delay += step;
                wordWrap.appendChild(span);
            }

            p.appendChild(wordWrap);
        });

        const tailMs = delay * 1000 + 300;
        setTimeout(resolve, tailMs);
    });
}

let scenePanX = 0;

function getScenePanX() {
    return scenePanX;

function panTitleSmoothstep(edge0, edge1, value) {
    const t = clamp((value - edge0) / (edge1 - edge0), 0, 1);
    return t * t * (3 - 2 * t);
}

function panTitleFadeIn(viewCenter, boundary, fadeBand, gap = 0) {
    const fadeStart = boundary + gap;
    const fadeEnd = boundary + fadeBand + gap;
    return panTitleSmoothstep(fadeStart, fadeEnd, viewCenter);
}

function panTitleFadeOut(viewCenter, boundary, fadeBand, lead = 0) {
    const fadeStart = boundary - fadeBand - lead;
    const fadeEnd = boundary - lead;
    return 1 - panTitleSmoothstep(fadeStart, fadeEnd, viewCenter);
}

function setPanSectionTitleOpacity(hostId, opacity) {

function updatePanSectionTitles() {
    const appW = getAppViewport().width;
    const { viewCenter, viewWidth } = getSceneViewBounds();

    const galleryStart = appW;
    const galleryEnd = galleryStart + getGalleryWidth();
    const favoritesStart = galleryEnd + getFavoritesGap();
    const favoritesEnd = favoritesStart + getFavoritesWidth();
    const playlistStart = favoritesEnd + getPlaylistGap();
    const playlistEnd = playlistStart + getPlaylistWidth();
    const finaleStart = playlistEnd + getFinaleGap();

    const fadeBand = clamp(viewWidth * 0.38, 280, 480);
    const crossfadeGap = clamp(viewWidth * 0.1, 72, 140);
    const boundaryIntroGallery = galleryStart;
    const boundaryGalleryFavorites = (galleryEnd + favoritesStart) / 2;
    const boundaryFavoritesPlaylist = (favoritesEnd + playlistStart) / 2;
    const boundaryPlaylistFinale = (playlistEnd + finaleStart) / 2;

    const galleryOpacity =
        panTitleFadeIn(viewCenter, boundaryIntroGallery, fadeBand) *
        panTitleFadeOut(viewCenter, boundaryGalleryFavorites, fadeBand, crossfadeGap);
    const favoritesOpacity =
        panTitleFadeIn(viewCenter, boundaryGalleryFavorites, fadeBand, crossfadeGap) *
        panTitleFadeOut(viewCenter, boundaryFavoritesPlaylist, fadeBand, crossfadeGap);
    const playlistOpacity =
        panTitleFadeIn(viewCenter, boundaryFavoritesPlaylist, fadeBand, crossfadeGap) *
        panTitleFadeOut(viewCenter, boundaryPlaylistFinale, fadeBand, crossfadeGap);
    const finaleOpacity = panTitleFadeIn(
        viewCenter,
        boundaryPlaylistFinale,
        fadeBand,
        crossfadeGap
    );

    setPanSectionTitleOpacity("memoryGallery", galleryOpacity);
    setPanSectionTitleOpacity("favoritesStage", favoritesOpacity);
    setPanSectionTitleOpacity("playlistStage", playlistOpacity);
    setPanSectionTitleOpacity("finaleStage", finaleOpacity);
}

function galleryRevealFade(t) {
    const x = clamp(t, 0, 1);
    return x * x * (3 - 2 * x);
}

function updateGalleryCardReveal() {
    const inner = document.querySelector(".memory-gallery-inner");
    if (!inner) return;

    const { viewLeft, viewRight } = getSceneViewBounds();
    const galleryOrigin = getAppViewport().width;
    const fadeBand = clamp(getAppViewport().width * 0.055, 84, 120);
    const enterLead = fadeBand * 0.5;
    const exitTail = fadeBand * 0.5;

    inner.querySelectorAll(".memory-card").forEach((card) => {
        const cardLeft = galleryOrigin + (parseFloat(card.style.left) || 0);
        const cardWidth = card.offsetWidth;
        const cardRight = cardLeft + cardWidth;

        if (cardWidth <= 0) return;

        let enterFade = 0;
        let exitFade = 0;

        const inRevealZone =
            cardRight > viewLeft - exitTail && cardLeft < viewRight + enterLead;

        if (inRevealZone) {
            enterFade = galleryRevealFade((viewRight + enterLead - cardLeft) / fadeBand);
            exitFade = galleryRevealFade((cardRight - (viewLeft - exitTail)) / fadeBand);
        }

        const reveal = Math.min(enterFade, exitFade);
        const opacity = reveal;

        const translateX = (1 - enterFade) * 30 + (1 - exitFade) * -22;
        const translateY = (1 - reveal) * 14;
        const scale = 0.93 + reveal * 0.07;

        const visible = opacity > 0.04;
        card.style.opacity = String(opacity);
        card.style.visibility = visible ? "visible" : "hidden";

        if (visible) {
            card.style.transform = `translate3d(${translateX}px, ${translateY}px, 0) scale(${scale})`;
        } else if (cardLeft >= viewRight + enterLead * 0.2) {
            card.style.transform = "translate3d(30px, 14px, 0) scale(0.93)";
        } else if (cardRight <= viewLeft - exitTail * 0.2) {
            card.style.transform = "translate3d(-22px, 14px, 0) scale(0.93)";
        } else {
            card.style.transform = "translate3d(30px, 14px, 0) scale(0.93)";
        }
    });
}

function setupSceneHorizontalPan() {
    if (document.documentElement.dataset.scenePanReady === "1") return;
    document.documentElement.dataset.scenePanReady = "1";

    let dragging = false;
    let startX = 0;
    let startPanX = 0;
    let activePointerId = null;
    let panMoved = false;

    const endDrag = (e) => {
        if (!dragging || e.pointerId !== activePointerId) return;
        dragging = false;
        activePointerId = null;
        document.body.classList.remove("scene-pan-dragging");
        if (panMoved) {
            document.body.dataset.scenePanMoved = "1";
            requestAnimationFrame(() => {
                document.body.dataset.scenePanMoved = "0";
            });
        }
    };

    document.addEventListener(
        "pointerdown",
        (e) => {
            if (!canScenePan()) return;
            if (e.button !== 0 || !isScenePanTarget(e.target)) return;

            dragging = true;
            panMoved = false;
            activePointerId = e.pointerId;
            startX = e.clientX;
            startPanX = scenePanX;
            document.body.setPointerCapture(e.pointerId);
        },
        { passive: true }
    );

    document.addEventListener(
        "pointermove",
        (e) => {
            if (!dragging || e.pointerId !== activePointerId) return;

            const dx = e.clientX - startX;
            if (Math.abs(dx) <= 4) return;

            panMoved = true;
            document.body.classList.add("scene-pan-dragging");
            setScenePanX(startPanX + dx);
            e.preventDefault();
        },
        { passive: false }
    );

    document.addEventListener("pointerup", endDrag);
    document.addEventListener("pointercancel", endDrag);

    document.addEventListener(
        "wheel",
        (e) => {
            if (!canScenePan()) return;
            if (getLetterCardTextHostAt(e.clientX, e.clientY)) return;
            if (!isScenePanTarget(e.target)) return;

            const deltaX = getLetterWheelDelta(
                e.deltaX,
                e.deltaMode,
                getAppViewport().width
            );
            if (!deltaX) return;

            setScenePanX(scenePanX - deltaX);
            e.preventDefault();
        },
        { passive: false, capture: true }
    );
}

function pickCardFlowerTipYs(bottomY, cardRect, count = 3) {
    const minStemH = Math.max(168, Math.min(cardRect.height * 0.34, 215));
    const maxStemH = Math.max(minStemH + 55, Math.min(cardRect.height * 0.52, 295));
    const minGap = 52;
    const tipYs = [];

    for (let i = 0; i < 80 && tipYs.length < count; i++) {
        const stemH = random(minStemH, maxStemH);
        const tipY = bottomY - stemH;
        if (tipYs.every((y) => Math.abs(y - tipY) >= minGap)) {
            tipYs.push(tipY);
        }
    }

    while (tipYs.length < count) {
        const stemH = minStemH + tipYs.length * (minGap * 0.9);
        tipYs.push(bottomY - stemH);
    }

    return tipYs.sort((a, b) => a - b);
}

function pickCardFlowerTypes(larkspurIndex) {
    const pool = ["rose", "desert", "tulip", "daisy"];
    const types = [null, null, null];
    types[larkspurIndex] = "larkspur";

    const otherSlots = [0, 1, 2].filter((i) => i !== larkspurIndex);
    const firstType = pool[Math.floor(Math.random() * pool.length)];
    types[otherSlots[0]] = firstType;

    const remaining = pool.filter((type) => type !== firstType);
    types[otherSlots[1]] =
        remaining[Math.floor(Math.random() * remaining.length)];

    return types;
}

function pickCardFlowerBaseX(side, cardRect, usedBases) {
    const minOut = 42;
    const maxOut = 90;
    const minSep = 38;

    for (let i = 0; i < 40; i++) {
        const outward = random(minOut, maxOut);
        const baseX =
            side === "left"
                ? cardRect.left - outward
                : cardRect.right + outward;

        if (usedBases.every((x) => Math.abs(x - baseX) >= minSep)) {
            return baseX;
        }
    }

    const outward = minOut + usedBases.length * minSep * 0.55;
    return side === "left"
        ? cardRect.left - outward
        : cardRect.right + outward;
}

function getCardFlowerStemGeometry(side, baseX, role) {
    const outerLean = random(20, 36);
    const innerLean = random(10, 24);

    if (side === "left") {
        if (role === "inner") {
            return {
                tipX: baseX + innerLean,
                bendAway: 1,
            };
        }
        return {
            tipX: baseX - outerLean,
            bendAway: -1,
        };
    }

    if (role === "inner") {
        return {
            tipX: baseX - innerLean,
            bendAway: -1,
        };
    }

    return {
        tipX: baseX + outerLean,
        bendAway: 1,
    };
}

function growCardSideStem(svg, baseX, tipX, tipY, bottomY, flowerType, bendAway, withHeavy = false) {
    if (bottomY - tipY < 30) return;

    beginCardPlant(svg, baseX, bottomY);
    if (withHeavy) {
        spawnHeavyPlant(baseX, bottomY, bendAway);
    }
    growStemFromBase(baseX, bottomY, tipX, tipY, flowerType, false, bendAway);
    if (currentPlant) {
        registerPlant(currentPlant);
    }
    endCardPlant();
}

function growLetterCardSideFlowers(letterArt) {
    const stage = letterArt?.closest(".love-letter-stage");
    const card = letterArt?.querySelector(".letter-card");
    if (!stage || !card || stage.dataset.cardFlowersGrown === "1") return;

    const cardRect = screenRectToLayout(card.getBoundingClientRect());
    if (cardRect.width < 1 || cardRect.height < 1) return;

    const svg = ensureLetterCardFlowersSvg();
    if (!svg) return;

    stage.dataset.cardFlowersGrown = "1";

    const bottomY = getAppViewport().height;
    const leftCount = Math.random() < 0.5 ? 2 : 1;
    const rightCount = 3 - leftCount;
    const doubleSide = leftCount === 2 ? "left" : "right";
    const singleSide = doubleSide === "left" ? "right" : "left";
    const tipYs = pickCardFlowerTipYs(bottomY, cardRect, 3);

    const sides = [];
    for (let i = 0; i < leftCount; i++) sides.push("left");
    for (let i = 0; i < rightCount; i++) sides.push("right");

    const doubleIndices = sides
        .map((side, index) => (side === doubleSide ? index : -1))
        .filter((index) => index >= 0);
    const larkspurIndex =
        doubleIndices[Math.floor(Math.random() * doubleIndices.length)];
    const types = pickCardFlowerTypes(larkspurIndex);

    const singleIndex = sides.findIndex((side) => side === singleSide);
    const tallestTipIndex = tipYs.indexOf(Math.min(...tipYs));
    if (singleIndex >= 0 && tallestTipIndex >= 0 && singleIndex !== tallestTipIndex) {
        [tipYs[singleIndex], tipYs[tallestTipIndex]] = [
            tipYs[tallestTipIndex],
            tipYs[singleIndex],
        ];
    }

    const usedBases = [];
    const doubleSideCounts = { left: 0, right: 0 };

    sides.forEach((side, index) => {
        const baseX = pickCardFlowerBaseX(side, cardRect, usedBases);
        usedBases.push(baseX);

        const role =
            side === doubleSide
                ? doubleSideCounts[side]++ === 0
                    ? "outer"
                    : "inner"
                : "outer";
        const { tipX, bendAway } = getCardFlowerStemGeometry(side, baseX, role);
        const tipY = tipYs[index];
        const delay = index * random(220, 380);

        setTimeout(() => {
            growCardSideStem(
                svg,
                baseX,
                tipX,
                tipY,
                bottomY,
                types[index],
                bendAway,
                index === singleIndex
            );
        }, delay);
    });
}

function syncLetterCardGlassHost(letterArt) {
    const stage = letterArt?.closest(".love-letter-stage");
    const card = letterArt?.querySelector(".letter-card");
    const glassHost = stage?.querySelector(".letter-card-glass-host");
    const textHost = stage?.querySelector(".letter-card-text-host");
    if (!stage || !card || !glassHost) return;

    const stageRect = stage.getBoundingClientRect();
    const cardRect = card.getBoundingClientRect();
    if (cardRect.width < 1 || cardRect.height < 1) {
        glassHost.classList.remove("is-active");
        return;
    }

    const zoom = getSceneZoom();
    const layoutWidth = cardRect.width / zoom;
    const layoutHeight = cardRect.height / zoom;
    const overlayStyle = {
        left: `${(cardRect.left - stageRect.left) / zoom}px`,
        top: `${(cardRect.top - stageRect.top) / zoom}px`,
        width: `${layoutWidth}px`,
        height: `${layoutHeight}px`,
        borderRadius: `${(2.5 / 253.17) * layoutWidth}px`,
    };

    Object.assign(glassHost.style, overlayStyle);
    glassHost.classList.add("is-active");

    if (textHost) {
        Object.assign(textHost.style, overlayStyle);
        textHost.style.fontSize = `${layoutWidth * 0.042}px`;
        updateLetterCardFades(textHost);
    }
}

function runLetterCardGlassSync(letterArt) {
    const wrap = letterArt?.querySelector(".letter-card-wrap");
    if (!wrap) return;

    wrap.dataset.glassSyncing = "1";

    const loop = () => {
        syncLetterCardGlassHost(letterArt);
        if (wrap.dataset.glassSyncing === "1") {
            wrap._glassSyncRaf = requestAnimationFrame(loop);
        }
    };

    if (wrap._glassSyncRaf) cancelAnimationFrame(wrap._glassSyncRaf);
    loop();
}

function stopLetterCardGlassSync(letterArt) {
    const wrap = letterArt?.querySelector(".letter-card-wrap");
    if (!wrap) return;

    wrap.dataset.glassSyncing = "0";
    if (wrap._glassSyncRaf) cancelAnimationFrame(wrap._glassSyncRaf);
    syncLetterCardGlassHost(letterArt);
}

function setupLoveLetterClick(stage) {
    const letterArt = stage?.querySelector(".love-letter-art");
    if (!stage || !letterArt || letterArt.dataset.clickReady) return;
    letterArt.dataset.clickReady = "1";

    letterArt.addEventListener("pointerdown", (e) => {
        if (!stage.classList.contains("is-interactive")) return;

        const heart = letterArt.querySelector(".love-heart-wrap");
        if (!heart || heart.classList.contains("is-faded")) return;

        heart.classList.add("is-peeled");
        e.stopPropagation();
    });

    letterArt.addEventListener("click", (e) => {
        if (!stage.classList.contains("is-interactive")) return;

        const heart = letterArt.querySelector(".love-heart-wrap");
        if (!heart || heart.classList.contains("is-faded")) return;

        e.stopPropagation();
        heart.classList.add("is-faded");

        heart.addEventListener(
            "transitionend",
            async (ev) => {
                if (ev.propertyName !== "opacity") return;
                await openEnvelopeFlaps(letterArt);
            },
            { once: true }
        );
    });
}

async function openEnvelopeFlaps(letterArt) {
    if (!letterArt || letterArt.classList.contains("envelope-open")) return;

    letterArt.classList.add("envelope-open");

    const flapOrder = ["flap-right", "flap-bottom", "flap-left", "flap-top"];
    const flapPause = 200;

    for (const flapClass of flapOrder) {
        const flap = letterArt.querySelector(`.${flapClass}`);
        if (!flap) continue;

        flap.classList.add("is-open");
        await waitForFlapToOpen(flap);
        flap.classList.add("is-vanished");

        if (flapClass !== "flap-top") {
            await wait(flapPause);
        }
    }

    await stretchLetterCard(letterArt);
}

function waitForFlapToOpen(flap) {
    const target = flap.classList.contains("flap-bottom")
        ? flap.querySelector(".flap-bottom-fold")
        : flap.querySelector(":scope > *");

    if (!target) return Promise.resolve();

    return new Promise((resolve) => {
        const finish = () => resolve();

        target.addEventListener(
            "transitionend",
            (e) => {
                if (e.propertyName === "transform") finish();
            },
            { once: true }
        );

        setTimeout(finish, 640);
    });
}

const CARD_EXTEND_UP_MS = 2100;
const CARD_EXTEND_DOWN_MS = 2100;
const ENVELOPE_RETRACT_MS = 1800;

function stretchLetterCard(letterArt) {
    const card = letterArt?.querySelector(".letter-card");
    if (!card) return;

    letterArt.classList.add("is-stretching-card", "is-retracting-envelope");
    runLetterCardGlassSync(letterArt);

    setTimeout(() => {
        const wrap = letterArt.querySelector(".letter-card-wrap");
        if (!wrap || wrap.dataset.cardUpBaked === "1") return;
        bakeLetterCardUpwardStretch(letterArt);
        wrap.dataset.cardUpBaked = "1";
        stopLetterCardGlassSync(letterArt);
    }, CARD_EXTEND_UP_MS);

    retractLoveLetterIntro();
}

function bakeLetterCardUpwardStretch(letterArt) {
    const wrap = letterArt?.querySelector(".letter-card-wrap");
    const card = wrap?.querySelector(".letter-card");
    if (!wrap || !card) return;

    const baseY = 2.715;
    const baseH = 175.57;
    const upScale = 1.65;
    const bottomY = baseY + baseH;
    const visualH = baseH * upScale;
    const visualTopY = bottomY - visualH;

    wrap.querySelectorAll(".letter-card, .letter-card-highlight, .letter-card-border, .letter-card-texture").forEach((layer) => {
        layer.setAttribute("y", String(visualTopY));
        layer.setAttribute("height", String(visualH));
    });
}

function extendLetterCardDown(letterArt) {
    const card = letterArt?.querySelector(".letter-card");
    const wrap = letterArt?.querySelector(".letter-card-wrap");
    if (!card) return Promise.resolve();

    if (wrap && wrap.dataset.cardUpBaked !== "1") {
        bakeLetterCardUpwardStretch(letterArt);
        wrap.dataset.cardUpBaked = "1";
    }

    runLetterCardGlassSync(letterArt);
    revealLetterCardText(letterArt);
    letterArt.classList.add("is-extending-card-down");

    return waitForCssAnimation(card, "letter-card-extend-down", CARD_EXTEND_DOWN_MS).then(
        () => stopLetterCardGlassSync(letterArt)
    );
}

async function retractLoveLetterIntro() {
    const state = loveLetterIntroState;
    if (!state || state.retracting) return;
    state.retracting = true;

    const { path, bud, budWrap, introSvg, letterStage, letterArt } = state;

    letterStage?.classList.remove("is-interactive");

    await wait(CARD_EXTEND_UP_MS + ENVELOPE_RETRACT_MS);

    const wrap = letterArt?.querySelector(".letter-card-wrap");
    if (wrap && wrap.dataset.cardUpBaked !== "1") {
        bakeLetterCardUpwardStretch(letterArt);
        wrap.dataset.cardUpBaked = "1";
    }

    stopLetterCardGlassSync(letterArt);

    await Promise.all([
        budWrap
            ? Promise.all([retractCircle(bud, 500), fadeSVGElement(budWrap, 500)])
            : Promise.resolve(),
        staggerRetractLeaves(introSvg),
        retractStem(path),
    ]);

    await extendLetterCardDown(letterArt);
}

function growLoveLetterIntro() {
    const introSvg = document.getElementById("letterIntro");
    const letterArt = document.querySelector(".love-letter-art");
    const letterStage = document.getElementById("loveLetterStage");
    if (!introSvg || !letterArt) return;

    const { width: viewW, height: viewH } = getAppViewport();
    updateWorldLayout();
    introSvg.setAttribute("width", String(getWorldWidth()));
    introSvg.setAttribute("height", String(viewH));
    introSvg.setAttribute("viewBox", `0 0 ${getWorldWidth()} ${viewH}`);

    const bottomY = viewH;
    const centerX = viewW / 2;
    const centerY = viewH / 2;
    const tipX = centerX;
    const tipY = centerY;
    const stemHeight = bottomY - tipY;

    if (stemHeight < 40) return;

    const bendDirection = Math.random() > 0.5 ? 1 : -1;
    const bendAmount =
        random(stemHeight * 0.05, stemHeight * 0.11) * bendDirection;
    const controlY = (bottomY + tipY) * 0.5;

    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute(
        "d",
        `M ${centerX} ${bottomY} Q ${centerX + bendAmount} ${controlY} ${tipX} ${tipY}`
    );
    path.classList.add("stem");

    const length = path.getTotalLength();
    const duration = Math.min(5000, Math.max(2200, length * 3));

    path.style.setProperty("--length", length);
    path.style.setProperty("--duration", `${duration}ms`);

    introSvg.appendChild(path);
    spawnLeaves(path, stemHeight, duration, introSvg);

    path.addEventListener(
        "animationend",
        () => {
            path.style.strokeDasharray = "none";
            path.style.strokeDashoffset = "0";
            path.style.animation = "none";

            const budWrap = document.createElementNS(
                "http://www.w3.org/2000/svg",
                "g"
            );
            budWrap.classList.add("calyx-glow");

            const bud = document.createElementNS(
                "http://www.w3.org/2000/svg",
                "circle"
            );
            bud.setAttribute("cx", tipX);
            bud.setAttribute("cy", tipY);
            bud.setAttribute("fill", "#dff5e6");
            bud.setAttribute("r", "0");
            budWrap.appendChild(bud);
            introSvg.appendChild(budWrap);

            growCircleFromZero(bud, 9, 500);

            loveLetterIntroState = {
                path,
                bud,
                budWrap,
                introSvg,
                tipY,
                bottomY,
                letterStage,
                letterArt,
            };

            growCircleFromZero(bud, 16, 500, () => {
                letterArt.addEventListener(
                    "animationend",
                    (e) => {
                        if (e.animationName !== "letter-bloom") return;
                        letterArt.classList.add("is-bloomed");
                        letterArt.style.transform = "none";
                        letterArt.style.animation = "none";
                    },
                    { once: true }
                );
                letterArt.classList.add("is-blooming");
                letterStage?.classList.add("is-interactive");
            });
        },
        { once: true }
    );
}

const MUSIC_TRACK = { x: 53, y: 9, width: 99, height: 2 };
const FLOWER_START_INSET = 2;
const FLOWER_END_INSET = 2;

async function initMusicBar() {
    const host = document.getElementById("musicBar");
    if (!host || host.dataset.ready === "1") return;

    const audio = document.createElement("audio");
    audio.preload = "auto";
    audio.playsInline = true;
    audio.loop = true;
    audio.src = "audio/song.mp3";
    host.appendChild(audio);
    audio.load();

    if (!host.dataset.gestureArmed) {
        host.dataset.gestureArmed = "1";
        document.addEventListener(
            "pointerdown",
            () => {
                void audio.play().catch(() => {});
            },
            { capture: true, once: true }
        );
    }

    let svg;
    try {
        const response = await fetch("images/UI/musicbar.svg");
        if (!response.ok) return;
        const svgText = await response.text();
        const doc = new DOMParser().parseFromString(svgText, "image/svg+xml");
        svg = doc.documentElement;
    } catch {
        return;
    }

    const root = svg.querySelector("g[filter]");
    const track = svg.querySelector('rect[x="53"][y="9"]');
    const flower = svg.querySelector('g[clip-path="url(#clip0_330_17)"]');
    const playBtn = root?.querySelector('path[d^="M109.282"]');
    const pauseBars = root
        ? Array.from(root.querySelectorAll("rect")).filter((rect) => {
              const y = parseFloat(rect.getAttribute("y") || "");
              const transform = rect.getAttribute("transform") || "";
              return y === 19 && transform.includes("rotate(90");
          })
        : [];

    if (!track || !flower || !playBtn || !pauseBars.length) return;

    const barBg = root?.querySelector('rect[x="4"][width="155"][height="34"]');
    if (barBg) {
        barBg.setAttribute("fill-opacity", "0");
    }

    host.dataset.ready = "1";
    track.setAttribute("data-music-track", "1");
    track.setAttribute("fill-opacity", "0.28");

    const fill = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    fill.setAttribute("x", String(MUSIC_TRACK.x));
    fill.setAttribute("y", String(MUSIC_TRACK.y));
    fill.setAttribute("height", String(MUSIC_TRACK.height));
    fill.setAttribute("rx", "1");
    fill.setAttribute("fill", "#FFCFFA");
    fill.setAttribute("width", "0");
    track.after(fill);

    const scrubber = document.createElementNS("http://www.w3.org/2000/svg", "g");
    scrubber.setAttribute("id", "music-scrubber");
    scrubber.setAttribute("data-music-scrubber", "1");
    flower.parentNode.insertBefore(scrubber, flower);
    scrubber.appendChild(flower);

    const hitArea = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    hitArea.setAttribute("x", String(MUSIC_TRACK.x));
    hitArea.setAttribute("y", String(MUSIC_TRACK.y - 8));
    hitArea.setAttribute("width", String(MUSIC_TRACK.width));
    hitArea.setAttribute("height", "18");
    hitArea.setAttribute("fill", "transparent");
    hitArea.setAttribute("data-music-track", "1");
    fill.after(hitArea);

    playBtn.setAttribute("data-music-play", "1");
    pauseBars.forEach((bar) => bar.setAttribute("data-music-pause", "1"));

    const controls = document.createElementNS("http://www.w3.org/2000/svg", "g");
    controls.setAttribute("id", "music-controls");

    playBtn.remove();
    const pauseGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
    pauseBars.forEach((bar) => {
        bar.remove();
        pauseGroup.appendChild(bar);
    });

    controls.appendChild(playBtn);
    controls.appendChild(pauseGroup);
    root.appendChild(controls);

    const glassLayer = document.createElement("div");
    glassLayer.className = "music-bar-glass-layer";
    glassLayer.setAttribute("aria-hidden", "true");
    host.appendChild(glassLayer);
    host.appendChild(svg);

    const playBox = playBtn.getBBox();
    const playCenterX = playBox.x + playBox.width / 2;
    const playCenterY = playBox.y + playBox.height / 2;
    const pauseBox = pauseGroup.getBBox();
    pauseGroup.setAttribute(
        "transform",
        `translate(${playCenterX - (pauseBox.x + pauseBox.width / 2)} ${playCenterY - (pauseBox.y + pauseBox.height / 2)})`
    );

    const trackCenterX = MUSIC_TRACK.x + MUSIC_TRACK.width / 2;
    const trackBottomY = MUSIC_TRACK.y + MUSIC_TRACK.height;
    controls.setAttribute(
        "transform",
        `translate(${trackCenterX - playCenterX} ${trackBottomY + 7 - playBox.y})`
    );

    const controlHit = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    const hitPad = 4;
    controlHit.setAttribute("x", String(playBox.x - hitPad));
    controlHit.setAttribute("y", String(playBox.y - hitPad));
    controlHit.setAttribute("width", String(playBox.width + hitPad * 2));
    controlHit.setAttribute("height", String(playBox.height + hitPad * 2));
    controlHit.setAttribute("fill", "transparent");
    controlHit.setAttribute("data-music-toggle", "1");
    controls.appendChild(controlHit);

    const flowerCenterX = scrubber.getBBox().x + scrubber.getBBox().width / 2;

    const scrubberBox = scrubber.getBBox();
    const scrubberPad = 8;
    const scrubberHit = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    scrubberHit.setAttribute("x", String(scrubberBox.x - scrubberPad));
    scrubberHit.setAttribute("y", String(scrubberBox.y - scrubberPad));
    scrubberHit.setAttribute("width", String(scrubberBox.width + scrubberPad * 2));
    scrubberHit.setAttribute("height", String(scrubberBox.height + scrubberPad * 2));
    scrubberHit.setAttribute("fill", "transparent");
    scrubberHit.setAttribute("data-music-scrubber", "1");
    scrubber.appendChild(scrubberHit);

    const photoThumb =
        root?.querySelector('rect[fill^="url(#pattern"]') ||
        root?.querySelector('rect[x="9.5"][height="23"]');
    let secretPanHit = null;

    if (photoThumb) {
        const photoBox = photoThumb.getBBox();
        secretPanHit = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        secretPanHit.setAttribute("x", String(photoBox.x));
        secretPanHit.setAttribute("y", String(photoBox.y));
        secretPanHit.setAttribute("width", String(photoBox.width));
        secretPanHit.setAttribute("height", String(photoBox.height));
        secretPanHit.setAttribute("rx", photoThumb.getAttribute("rx") || "4.5");
        secretPanHit.setAttribute("fill", "transparent");
        secretPanHit.setAttribute("data-music-secret-pan", "1");
        root.appendChild(secretPanHit);
    }

    let draggingScrubber = false;
    let resumeAfterDrag = false;
    let secretPanTapCount = 0;
    let secretPanTapTimer = null;
    const SECRET_PAN_TAP_WINDOW_MS = 900;

    function setPlayingUI(playing) {
        playBtn.style.display = playing ? "none" : "block";
        pauseGroup.style.display = playing ? "block" : "none";
    }

    function setProgress(ratio) {
        const progress = Math.max(0, Math.min(1, ratio));
        const travel = MUSIC_TRACK.width - FLOWER_START_INSET - FLOWER_END_INSET;
        const x = MUSIC_TRACK.x + FLOWER_START_INSET + progress * travel;
        fill.setAttribute("width", String(FLOWER_START_INSET + progress * travel));
        scrubber.setAttribute("transform", `translate(${x - flowerCenterX}, 0)`);
    }

    function clientXToRatio(clientX) {
        const pt = svg.createSVGPoint();
        pt.x = clientX;
        pt.y = 0;
        const ctm = svg.getScreenCTM();
        if (!ctm) return 0;
        const svgX = pt.matrixTransform(ctm.inverse()).x;
        return Math.max(0, Math.min(1, (svgX - MUSIC_TRACK.x) / MUSIC_TRACK.width));
    }

    function seekFromClientX(clientX) {
        if (!audio.duration) return;
        const ratio = clientXToRatio(clientX);
        audio.currentTime = ratio * audio.duration;
        setProgress(ratio);
    }

    function endScrubDrag(e) {
        if (!draggingScrubber) return;
        draggingScrubber = false;
        host.classList.remove("is-scrubbing");
        if (host.hasPointerCapture(e.pointerId)) {
            host.releasePointerCapture(e.pointerId);
        }
        if (resumeAfterDrag && audio.paused) {
            void playAudio();
        }
    }

    async function playAudio() {
        try {
            await audio.play();
        } catch {
            /* blocked until user gesture */
        }
    }

    function togglePlayback() {
        if (audio.paused) {
            void playAudio();
        } else {
            audio.pause();
        }
    }

    function isMusicScrubber(target) {
        if (!(target instanceof Element)) return false;
        return Boolean(target.closest("[data-music-scrubber]"));
    }

    function isMusicControl(target) {
        if (!(target instanceof Element)) return false;
        return Boolean(
            target.closest("[data-music-toggle]") ||
            target.closest("[data-music-play]") ||
            target.closest("[data-music-pause]") ||
            target === playBtn ||
            target === pauseGroup ||
            pauseBars.includes(target)
        );
    }

    function isMusicTrack(target) {
        if (!(target instanceof Element)) return false;
        return Boolean(
            target.closest("[data-music-track]") ||
            target === hitArea ||
            target === track
        );
    }

    host.addEventListener(
        "pointerdown",
        (e) => {
            e.stopPropagation();

            if (
                e.button === 0 &&
                !canScenePan() &&
                isMusicSecretPanTarget(e.target)
            ) {
                e.preventDefault();
                secretPanTapCount += 1;
                clearTimeout(secretPanTapTimer);

                if (secretPanTapCount >= 3) {
                    secretPanTapCount = 0;
                    enableSecretPanAccess();
                    return;
                }

                secretPanTapTimer = setTimeout(() => {
                    secretPanTapCount = 0;
                }, SECRET_PAN_TAP_WINDOW_MS);
                return;
            }

            if (isMusicControl(e.target)) {
                e.preventDefault();
                togglePlayback();
                return;
            }

            if (isMusicScrubber(e.target)) {
                e.preventDefault();
                draggingScrubber = true;
                resumeAfterDrag = !audio.paused;
                host.classList.add("is-scrubbing");
                host.setPointerCapture(e.pointerId);
                seekFromClientX(e.clientX);
                return;
            }

            if (isMusicTrack(e.target)) {
                e.preventDefault();
                seekFromClientX(e.clientX);
                if (audio.paused) void playAudio();
            }
        },
        true
    );

    host.addEventListener("pointermove", (e) => {
        if (!draggingScrubber) return;
        e.preventDefault();
        seekFromClientX(e.clientX);
    });

    host.addEventListener("pointerup", endScrubDrag);
    host.addEventListener("pointercancel", endScrubDrag);

    audio.addEventListener("play", () => setPlayingUI(true));
    audio.addEventListener("pause", () => setPlayingUI(false));
    audio.addEventListener("ended", () => {
        setPlayingUI(false);
        setProgress(1);
    });

    audio.addEventListener("timeupdate", () => {
        if (draggingScrubber || !audio.duration) return;
        setProgress(audio.currentTime / audio.duration);
    });

    setPlayingUI(!audio.paused);
    setProgress(audio.duration ? audio.currentTime / audio.duration : 0);
}

void initMusicBar();

</script>

</body>
</html>
