<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Petit+Formal+Script&display=swap" rel="stylesheet">

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:#000;
    cursor:pointer;
}

html{
    background:#000;
}

html.viewport-locked,
html.viewport-locked body{
    width:var(--app-w);
    height:var(--app-h);
    max-width:var(--app-w);
    max-height:var(--app-h);
    overflow:hidden;
}

html.viewport-locked body{
    position:fixed;
    top:0;
    left:0;
}

html.viewport-locked .sky,
html.viewport-locked #garden,
html.viewport-locked #letterIntro,
html.viewport-locked #letterCardFlowers,
html.viewport-locked #memoryGallery,
html.viewport-locked #favoritesStage,
html.viewport-locked #playlistStage,
html.viewport-locked #finaleStage,
html.viewport-locked .love-letter-stage{
    position:fixed;
    top:0;
    left:0;
    width:var(--world-w);
    height:var(--app-h);
    transform:scale(var(--scene-zoom, 1));
    transform-origin:top left;
}

html.viewport-locked .love-letter-art{
    width:min(calc(var(--app-w) * 0.92), 520px);
}

body.letter-focus{
    cursor:default;
}

body.letter-focus #garden{
    visibility:hidden;
    pointer-events:none;
}

body.scene-pannable{
    cursor:grab;
}

body.scene-pannable.scene-pan-dragging{
    cursor:grabbing;
}

body.scene-pannable .sky,
body.scene-pannable #garden,
body.scene-pannable #letterIntro,
body.scene-pannable #letterCardFlowers,
body.scene-pannable #memoryGallery,
body.scene-pannable #favoritesStage,
body.scene-pannable #playlistStage,
body.scene-pannable #finaleStage,
body.scene-pannable .love-letter-stage{
    transform:scale(var(--scene-zoom, 1))
        translateX(calc(var(--scene-pan-x, 0px) / var(--scene-zoom, 1)));
}

.letter-card-wrap .letter-card,
.letter-card-wrap .letter-card-highlight,
.letter-card-wrap .letter-card-border,
.letter-card-wrap .letter-card-texture{
    transform-box:view-box;
}

.letter-card-glass-host{
    position:absolute;
    z-index:4;
    pointer-events:none;
    opacity:0;
    overflow:hidden;
}

.letter-card-glass-host.is-active{
    opacity:1;
}

.letter-card-glass-pane{
    width:100%;
    height:100%;
    background:rgba(8,5,12,0.5);
    -webkit-backdrop-filter:blur(14px) saturate(1.15);
    backdrop-filter:blur(14px) saturate(1.15);
}

.letter-card-text-host{
    position:absolute;
    z-index:10;
    pointer-events:none;
    opacity:0;
    overflow:hidden;
    transition:opacity 0.35s ease;
}

.letter-card-text-host.is-visible{
    opacity:1;
    pointer-events:auto;
    overflow-y:auto;
    overflow-x:auto;
    overscroll-behavior:contain;
    -webkit-overflow-scrolling:touch;
    touch-action:none;
    cursor:grab;
    scrollbar-width:none;
    --fade-top:0px;
    --fade-bottom:0px;
    -webkit-mask-image:linear-gradient(
        to bottom,
        transparent 0,
        #000 var(--fade-top),
        #000 calc(100% - var(--fade-bottom)),
        transparent 100%
    );
    mask-image:linear-gradient(
        to bottom,
        transparent 0,
        #000 var(--fade-top),
        #000 calc(100% - var(--fade-bottom)),
        transparent 100%
    );
}

.letter-card-text-host.is-visible::-webkit-scrollbar{
    display:none;
}

.letter-card-text-host.is-drag-scrolling{
    cursor:grabbing;
    user-select:none;
}

.letter-card-copy{
    width:100%;
    min-height:100%;
    margin:0;
    padding:9% 8% 10%;
    overflow:visible;
    font-family:"Petit Formal Script", cursive;
    color:rgba(255, 245, 252, 0.94);
    line-height:1.55;
    text-align:center;
    text-shadow:
        0 0 12px rgba(255, 210, 245, 0.95),
        0 0 28px rgba(255, 160, 225, 0.72),
        0 0 48px rgba(255, 120, 210, 0.52),
        0 0 72px rgba(255, 80, 195, 0.35);
}

.letter-card-copy p{
    margin:0 0 0.85em;
}

.letter-card-copy p:last-child{
    margin-bottom:0;
}

.letter-yes-button{
    display:block;
    position:relative;
    margin:1.1em auto 1.15em;
    padding:0.55em 3.35em;
    min-width:9.2em;
    border:1px solid rgba(255, 207, 250, 0.58);
    border-radius:999px;
    background:rgba(255, 105, 195, 0.14);
    -webkit-backdrop-filter:blur(12px) saturate(1.12);
    backdrop-filter:blur(12px) saturate(1.12);
    box-shadow:
        0 0 18px rgba(255, 140, 220, 0.22),
        inset 0 0 20px rgba(255, 180, 235, 0.08);
    font-family:"Petit Formal Script", cursive;
    font-size:1.05em;
    font-weight:600;
    -webkit-text-stroke:0.22px rgba(255, 228, 248, 0.42);
    line-height:1;
    color:rgba(255, 228, 248, 0.98);
    text-shadow:
        0 0 12px rgba(255, 210, 245, 0.95),
        0 0 28px rgba(255, 160, 225, 0.72),
        0 0 48px rgba(255, 120, 210, 0.52);
    opacity:0;
    transform:translateY(10px) scale(0.94);
    transition:
        opacity 0.55s ease,
        transform 0.6s cubic-bezier(0.22, 1, 0.36, 1),
        box-shadow 0.35s ease;
    cursor:pointer;
    pointer-events:auto;
}

.letter-yes-button.is-visible{
    opacity:1;
    transform:translateY(0) scale(1);
}

.letter-yes-button:hover{
    box-shadow:
        0 0 24px rgba(255, 150, 225, 0.38),
        inset 0 0 24px rgba(255, 190, 235, 0.12);
}

.letter-tap-hint{
    margin-top:2.35em;
    font-weight:700;
    -webkit-text-stroke:0.28px rgba(255, 228, 248, 0.5);
}

.letter-tap-hint .letter-char{
    text-shadow:
        0 0 14px rgba(255, 210, 245, 0.98),
        0 0 32px rgba(255, 160, 225, 0.82),
        0 0 56px rgba(255, 120, 210, 0.62),
        0 0 80px rgba(255, 80, 195, 0.42);
}

.pan-hint-arrow{
    position:fixed;
    right:clamp(14px, 2.8vw, 28px);
    top:50%;
    z-index:12;
    transform:translateY(-50%);
    pointer-events:none;
    opacity:0;
    visibility:hidden;
    transition:opacity 0.55s ease, visibility 0.55s ease;
}

.pan-hint-arrow.is-visible{
    opacity:1;
    visibility:visible;
}

.pan-hint-arrow-icon{
    display:block;
    width:clamp(68px, 13vw, 112px);
    height:auto;
    filter:
        drop-shadow(0 0 14px rgba(255, 160, 230, 0.55))
        drop-shadow(0 0 28px rgba(255, 120, 210, 0.32));
    animation:pan-hint-arrow-pulse 1.35s ease-in-out infinite;
}

@keyframes pan-hint-arrow-pulse{
    0%, 100%{
        transform:translateX(0);
        opacity:0.82;
    }
    50%{
        transform:translateX(-16px);
        opacity:1;
    }
}

.letter-word{
    display:inline-block;
    white-space:nowrap;
}

.letter-char{
    opacity:0;
    animation:letter-in 0.18s ease-out forwards;
    text-shadow:
        0 0 12px rgba(255, 210, 245, 0.95),
        0 0 28px rgba(255, 160, 225, 0.72),
        0 0 48px rgba(255, 120, 210, 0.52),
        0 0 72px rgba(255, 80, 195, 0.35);
}

.letter-space{
    display:inline-block;
    width:0.28em;
}

@keyframes letter-in{
    to{
        opacity:1;
    }
}

.love-letter-stage .love-letter-art{
    position:relative;
    z-index:3;
}

.letter-card-highlight,
.letter-card-border{
    pointer-events:none;
}

.letter-card-highlight{
    mix-blend-mode:screen;
    opacity:0.82;
}

.letter-card-texture{
    pointer-events:none;
    visibility:hidden;
}

.love-letter-art.is-stretching-card .letter-card,
.love-letter-art.is-extending-card-down .letter-card{
    fill:transparent;
}

.love-letter-art.is-stretching-card .letter-card,
.love-letter-art.is-stretching-card .letter-card-highlight,
.love-letter-art.is-stretching-card .letter-card-border,
.love-letter-art.is-stretching-card .letter-card-texture{
    animation:letter-card-extend-up 2.1s ease-out forwards;
}

@keyframes letter-card-extend-up{
    from{
        y:2.715px;
        height:175.57px;
    }
    to{
        y:-111.405px;
        height:289.69px;
    }
}

.love-letter-art.is-extending-card-down .letter-card,
.love-letter-art.is-extending-card-down .letter-card-highlight,
.love-letter-art.is-extending-card-down .letter-card-border,
.love-letter-art.is-extending-card-down .letter-card-texture{
    animation:letter-card-extend-down 2.1s ease-out forwards;
}

@keyframes letter-card-extend-down{
    from{
        height:289.69px;
    }
    to{
        height:362.11px;
    }
}

.love-letter-stage{
    position:fixed;
    top:0;
    left:0;
    z-index:2;
    width:var(--world-w, 100vw);
    height:var(--app-h, 100vh);
    display:grid;
    grid-template-columns:var(--app-w) minmax(0, 1fr);
    align-items:center;
    justify-items:center;
    pointer-events:none;
    overflow:visible;
}

.love-letter-stage > *{
    grid-column:1;
    grid-row:1;
}

.love-letter-stage.is-interactive{
    cursor:default;
}

.love-letter-stage.is-interactive .love-letter-art{
    pointer-events:auto;
    cursor:default;
}

.love-letter-art.envelope-open .envelope-flaps-3d{
    transform-style:preserve-3d;
    perspective:1400px;
    perspective-origin:center center;
}

.love-letter-art.is-blooming{
    visibility:visible;
    opacity:1;
    animation:letter-bloom 950ms ease-out forwards;
    transform-style:preserve-3d;
}

.love-letter-art.is-bloomed{
    visibility:visible;
    opacity:1;
    transform:none;
    transform-style:preserve-3d;
}

.love-letter-art.is-blooming .envelope-base,
.love-letter-art.is-bloomed:not(.is-retracting-envelope) .envelope-base{
    transform-box:view-box;
    transform-origin:130.5px 90.5px;
    filter:
        drop-shadow(0 0 6px rgba(255, 190, 245, 0.55))
        drop-shadow(0 0 18px rgba(255, 140, 225, 0.42))
        drop-shadow(0 0 34px rgba(255, 110, 210, 0.3))
        drop-shadow(0 0 52px rgba(255, 80, 190, 0.18));
    animation:letter-glow 3.2s ease-in-out 950ms infinite;
}

@keyframes letter-bloom-retract{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(0);
    }
}

.love-letter-art.is-retracting-envelope .envelope-base{
    transform-box:view-box;
    transform-origin:130.5px 90.5px;
    filter:
        drop-shadow(0 0 6px rgba(255, 190, 245, 0.55))
        drop-shadow(0 0 18px rgba(255, 140, 225, 0.42))
        drop-shadow(0 0 34px rgba(255, 110, 210, 0.3))
        drop-shadow(0 0 52px rgba(255, 80, 190, 0.18));
    animation:
        letter-bloom-retract var(--envelope-retract) ease-in-out var(--card-extend-up) forwards,
        letter-glow-fade-out var(--envelope-retract) ease-out var(--card-extend-up) forwards;
}

.love-heart-wrap{
    transform-box:view-box;
    transform-origin:131px 138px;
    transition:
        transform 1.05s cubic-bezier(0.33, 1.12, 0.64, 1),
        filter 1.05s ease,
        opacity 1.1s ease;
}

.flap-bottom-fold{
    transform-box:view-box;
    transform-origin:130.5px 181px;
    transform-style:preserve-3d;
    backface-visibility:hidden;
    transition:
        transform 0.58s ease-in-out,
        opacity 0.18s ease-out;
}

.stamp-image{
    pointer-events:none;
}

.flap-bottom.is-open .flap-bottom-fold{
    transform:rotateX(-90deg);
}

.flap-bottom.is-vanished .flap-bottom-fold{
    opacity:0;
    visibility:hidden;
    pointer-events:none;
}

.love-heart-wrap.is-peeled,
.love-letter-stage.is-interactive .love-letter-art:hover .love-heart-wrap:not(.is-faded){
    transform:rotate(-26deg) translate(-7px, -16px);
    filter:drop-shadow(-3px 6px 8px rgba(80, 0, 40, 0.28));
}

.love-heart-wrap.is-faded{
    opacity:0;
    pointer-events:none;
    transition:opacity 1.1s ease;
}

.envelope-flap{
    transform-style:preserve-3d;
}

.envelope-flap > *{
    transform-box:view-box;
    transform-style:preserve-3d;
    backface-visibility:hidden;
    transition:
        transform 0.58s ease-in-out,
        opacity 0.18s ease-out;
}

.envelope-flap.is-vanished > *{
    opacity:0;
    visibility:hidden;
    pointer-events:none;
}

.flap-right > *{
    transform-origin:261px 90.5px;
}

.flap-right.is-open > *{
    transform:rotateY(90deg);
}

.flap-left > *{
    transform-origin:0px 90.5px;
}

.flap-left.is-open > *{
    transform:rotateY(-90deg);
}

.flap-top > *{
    transform-origin:130.5px 0px;
}

.flap-top.is-open > *{
    transform:rotateX(90deg);
}

.love-letter-art{
    --card-extend-up:2.1s;
    --envelope-retract:1.8s;
    display:block;
    position:static;
    width:min(92vw, 520px);
    height:auto;
    overflow:visible;
    visibility:hidden;
    opacity:0;
    transform:scale(0);
    transform-origin:center center;
    filter:none;
    pointer-events:none;
}

@keyframes letter-bloom{
    from{
        transform:scale(0);
    }
    to{
        transform:scale(1);
    }
}

@keyframes letter-glow-fade-out{
    from{
        filter:
            drop-shadow(0 0 6px rgba(255, 190, 245, 0.55))
            drop-shadow(0 0 18px rgba(255, 140, 225, 0.42))
            drop-shadow(0 0 34px rgba(255, 110, 210, 0.3))
            drop-shadow(0 0 52px rgba(255, 80, 190, 0.18));
    }
    to{
        filter:
            drop-shadow(0 0 6px rgba(255, 190, 245, 0))
            drop-shadow(0 0 18px rgba(255, 140, 225, 0))
            drop-shadow(0 0 34px rgba(255, 110, 210, 0))
            drop-shadow(0 0 52px rgba(255, 80, 190, 0));
    }
}

@keyframes letter-glow{
    0%, 100%{
        filter:
            drop-shadow(0 0 6px rgba(255, 190, 245, 0.55))
            drop-shadow(0 0 18px rgba(255, 140, 225, 0.42))
            drop-shadow(0 0 34px rgba(255, 110, 210, 0.3))
            drop-shadow(0 0 52px rgba(255, 80, 190, 0.18));
    }
    50%{
        filter:
            drop-shadow(0 0 9px rgba(255, 200, 250, 0.65))
            drop-shadow(0 0 24px rgba(255, 150, 230, 0.5))
            drop-shadow(0 0 42px rgba(255, 120, 215, 0.38))
            drop-shadow(0 0 60px rgba(255, 90, 195, 0.24));
    }
}

#letterIntro{
    z-index:1;
}

.sky{
    position:fixed;
    top:0;
    left:0;
    width:var(--world-w, 100vw);
    height:var(--app-h, 100vh);
    z-index:0;
    pointer-events:none;
    overflow:hidden;
}

.aurora{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    background:
        linear-gradient(
            100deg,
            rgba(150, 230, 210, 0.09) 0%,
            rgba(255, 175, 215, 0.07) 50%,
            rgba(186, 160, 255, 0.09) 100%
        ),
        linear-gradient(
            to bottom,
            rgba(186, 160, 255, 0.15) 0%,
            rgba(170, 195, 255, 0.08) 15%,
            rgba(100, 90, 130, 0.04) 35%,
            rgba(40, 35, 55, 0.015) 55%,
            #000000 80%
        );
}

.star{
    position:absolute;
    border-radius:50%;
    background:#fff;
    box-shadow:0 0 4px rgba(255, 255, 255, 0.6);
    animation:star-twinkle var(--dur) ease-in-out infinite;
    animation-delay:var(--delay);
}

@keyframes star-twinkle{
    0%, 100%{
        opacity:0.12;
        transform:scale(0.5);
    }
    50%{
        opacity:0.95;
        transform:scale(1.1);
    }
}

#garden,
#letterIntro,
#letterCardFlowers{
    position:fixed;
    top:0;
    left:0;
    z-index:1;
    width:100%;
    height:var(--app-h, 100vh);
    pointer-events:none;
}

#letterCardFlowers{
    z-index:2;
}

#memoryGallery{
    position:fixed;
    top:0;
    left:0;
    z-index:1;
    width:var(--world-w, 100vw);
    height:var(--app-h, 100vh);
    pointer-events:none;
    overflow:hidden;
}

#favoritesStage{
    position:fixed;
    top:0;
    left:0;
    z-index:1;
    width:var(--world-w, 100vw);
    height:var(--app-h, 100vh);
    pointer-events:none;
    overflow:hidden;
}

.favorites-stage-panel{
    position:absolute;
    top:0;
    left:calc(var(--app-w) + var(--gallery-w, 0px) + var(--favorites-gap, 0px));
    width:var(--favorites-w, var(--app-w));
    height:100%;
    box-sizing:border-box;
}

#playlistStage{
    position:fixed;
    top:0;
    left:0;
    z-index:1;
    width:var(--world-w, 100vw);
    height:var(--app-h, 100vh);
    pointer-events:none;
    overflow:hidden;
}

.playlist-stage-panel{
    position:absolute;
    top:0;
    left:calc(
        var(--app-w) + var(--gallery-w, 0px) + var(--favorites-gap, 0px) +
        var(--favorites-w, 0px) + var(--playlist-gap, 0px)
    );
    width:var(--playlist-w, var(--app-w));
    height:100%;
    box-sizing:border-box;
    pointer-events:none;
}

.playlist-embeds{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:clamp(14px, 2vh, 20px);
    width:100%;
    height:100%;
    padding:clamp(92px, 13vh, 112px) clamp(20px, 4vw, 40px) 28px;
    box-sizing:border-box;
}

.playlist-embeds-row{
    display:flex;
    gap:clamp(16px, 2.5vw, 24px);
    justify-content:center;
    width:auto;
}

.playlist-embed{
    flex:0 0 auto;
    width:300px;
    height:152px;
    border:0;
    border-radius:12px;
    background:transparent;
    pointer-events:auto;
    box-shadow:
        0 10px 28px rgba(0, 0, 0, 0.24),
        0 0 18px rgba(255, 120, 210, 0.12);
}

#finaleStage{
    position:fixed;
    top:0;
    left:0;
    z-index:1;
    width:var(--world-w, 100vw);
    height:var(--app-h, 100vh);
    pointer-events:none;
    overflow:hidden;
}

.finale-stage-panel{
    position:absolute;
    top:0;
    left:calc(
        var(--app-w) + var(--gallery-w, 0px) + var(--favorites-gap, 0px) +
        var(--favorites-w, 0px) + var(--playlist-gap, 0px) +
        var(--playlist-w, 0px) + var(--finale-gap, 0px)
    );
    width:var(--finale-w, var(--app-w));
    height:100%;
    box-sizing:border-box;
}

.finale-garden{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    overflow:visible;
    pointer-events:none;
}

.finale-garden-back{
    z-index:0;
}

.finale-garden-front{
    z-index:2;
}

.finale-house{
    position:absolute;
    bottom:0;
    left:50%;
    z-index:1;
    transform:translateX(calc(-50% + 150px)) translateY(10px);
    width:min(230%, 1600px);
    height:auto;
    display:block;
    pointer-events:none;
    object-fit:contain;
    object-position:center bottom;
}

.finale-gates{
    position:absolute;
    bottom:0;
    left:50%;
    z-index:3;
    transform:translateX(calc(-50% + 48px));
    display:flex;
    align-items:flex-end;
    justify-content:center;
    width:min(240%, 1880px);
    pointer-events:none;
}

.finale-gate{
    flex:0 0 auto;
    width:50%;
    height:auto;
    display:block;
    pointer-events:none;
    object-fit:contain;
    object-position:center bottom;
}

.finale-gate:first-child{
    transform:translateX(72px);
}

.favorites-arc-ring{
    position:absolute;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:min(186%, 1900px);
    height:min(76vh, 640px);
    overflow:visible;
    pointer-events:none;
}

.favorites-arc-ring-spin{
    transform-origin:0 0;
    animation:favorites-arc-spin 72s linear infinite;
}

.favorites-arc-ring circle{
    display:none;
}

.favorites-arc-photos{
    pointer-events:none;
}

.favorites-arc-photo-image{
    pointer-events:none;
}

@keyframes favorites-arc-spin{
    to{
        transform:rotate(360deg);
    }
}

.memory-gallery-inner{
    position:absolute;
    top:0;
    left:var(--app-w);
    width:max-content;
    min-width:100%;
    height:100%;
    max-height:100%;
    padding:var(--gallery-top-space, 88px) var(--gallery-side-pad, 40px) 24px;
    box-sizing:border-box;
    overflow:hidden;
}

.pan-section-title{
    position:absolute;
    top:28px;

/* Stem */

.stem{
    fill:none;
    stroke:#dff5e6;
    stroke-width:6.65;
    stroke-linecap:butt;
    stroke-linejoin:round;

    filter:
        drop-shadow(0 0 6px #2ecc71)
        drop-shadow(0 0 18px #2ecc71);

    stroke-dasharray:var(--length);
    stroke-dashoffset:var(--length);

    animation:
        grow var(--duration)
        ease-in-out
        forwards;
}

.leaf{
    fill:#dff5e6;
    stroke:none;
    transform-box: fill-box;
    transform-origin: 0 0;
    transform: scale(0);

    filter:
        drop-shadow(0 0 6px #2ecc71)
        drop-shadow(0 0 18px #2ecc71);

    animation:
        leaf-grow 650ms
        ease-out
        forwards;
}

@keyframes leaf-grow{
    to{
        transform: scale(1);
    }
}

.grass-clump{
    transform-box: fill-box;
    transform-origin: 43px 88px;
    transform: scaleY(0);

    filter:
        drop-shadow(0 0 6px #2ecc71)
        drop-shadow(0 0 18px #2ecc71);

    animation:
        grass-grow 650ms
        ease-out
        forwards;
}

@keyframes grass-grow{
    to{
        transform: scaleY(1);
    }
}

.heavy-leaf{
    fill:#dff5e6;
    stroke:none;
    transform-box: fill-box;
    transform-origin: 0 0;
    transform: scale(0);

    filter: drop-shadow(0 0 6px #2ecc71);

    animation:
        leaf-grow 500ms
        ease-out
        forwards;
}

@keyframes grow{
    to{
        stroke-dashoffset:0;
    }
}

.calyx-glow{
    filter:
        drop-shadow(0 0 6px #2ecc71)
        drop-shadow(0 0 18px #2ecc71);
}

.petal{
    transform-box: fill-box;
    transform-origin: 80px 120px;
    transform: scaleY(0);

    filter: drop-shadow(0 0 36px rgba(255, 140, 222, 1));

    animation:
        petal-grow 900ms
        ease-out
        forwards;

.desert-petal-glow{

}

@keyframes petal-grow{
    to{
        transform: scaleY(1);
    }
}

function saveGalleryCaption(cardIndex, text) {
    if (!GALLERY_CAPTIONS_EDITABLE) return;

    try {
        const saved = JSON.parse(
            localStorage.getItem(GALLERY_CAPTION_STORAGE_KEY) || "{}"
        );
        const trimmed = text.trim();

        if (trimmed) {
            saved[String(cardIndex)] = trimmed;
        } else {
            delete saved[String(cardIndex)];
        }

        localStorage.setItem(GALLERY_CAPTION_STORAGE_KEY, JSON.stringify(saved));
    } catch (error) {
        console.warn("Could not save gallery caption.", error);
    }
}

        card.classList.toggle("has-caption", Boolean(text));
        updateGalleryMarkupLabels();

        if (!text) {
            caption.innerHTML = "";
        }
    };

    caption.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
            e.preventDefault();
            commitCaption();
            caption.blur();
        }
    });

    caption.addEventListener("blur", commitCaption);
    caption.addEventListener("paste", (e) => {
        e.preventDefault();
        const text = (e.clipboardData?.getData("text") || "")
            .replace(/\s+/g, " ")
            .trim();
        if (!text) return;

        document.execCommand("insertText", false, text);
    });
    caption.addEventListener("pointerdown", (e) => {
        e.stopPropagation();
        caption.focus();
    });
}

function getGalleryLayoutMetrics() {

function clamp(value, min, max) {

function gallerySeed(index) {

function sortGalleryCardsByIndex(cards) {

        const bIndex = parseInt(b.dataset.cardIndex || "0", 10);
        return aIndex - bIndex;
    });
}

function pickGalleryPlacement(valid) {
    if (!valid.length) return null;

    return valid.reduce((best, slot) => {
        if (!best) return slot;
        if (slot.top > best.top + 0.5) return slot;
        if (Math.abs(slot.top - best.top) <= 0.5 && slot.left < best.left) {
            return slot;
        }
        return best;
    }, null);
}

function galleryRectsOverlap(left, top, right, bottom, placed) {
    for (const slot of placed) {
        const hSeparated =
            right + GALLERY_GAP <= slot.left + 0.5 ||
            left >= slot.right + GALLERY_GAP - 0.5;
        const vSeparated =
            bottom + GALLERY_GAP <= slot.top + 0.5 ||
            top >= slot.bottom + GALLERY_GAP - 0.5;

        if (!hSeparated && !vSeparated) return true;
    }

    return false;
}

function galleryTopForSpan(left, right, cardH, placed, floorBottom) {
    let surfaceTop = Infinity;

    for (const slot of placed) {
        if (left < slot.right - 0.5 && right > slot.left + 0.5) {
            surfaceTop = Math.min(surfaceTop, slot.top);
        }
    }

    if (!Number.isFinite(surfaceTop)) {
        return floorBottom - cardH;
    }

    return surfaceTop - GALLERY_GAP - cardH;
}

function getSnappedXCandidates(placed, sidePad, brickOffset = 0) {
    const xs = new Set([sidePad]);

    if (brickOffset > 0) {
        xs.add(sidePad + brickOffset);
    }

    placed.forEach((slot) => {
        xs.add(slot.right + GALLERY_GAP);
    });

    return [...xs].sort((a, b) => a - b);
}

function mergeGalleryFreeCells(free, xs, ys, minW, minH) {
    const rows = free.length;
    const cols = free[0]?.length || 0;
    const used = Array.from({ length: rows }, () => Array(cols).fill(false));
    const rects = [];

    for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
            if (!free[row][col] || used[row][col]) continue;

            let colEnd = col;
            while (
                colEnd + 1 < cols &&
                free[row][colEnd + 1] &&
                !used[row][colEnd + 1]
            ) {
                colEnd++;
            }

            let rowEnd = row;
            while (rowEnd + 1 < rows) {
                let rowFull = true;
                for (let c = col; c <= colEnd; c++) {
                    if (!free[rowEnd + 1][c] || used[rowEnd + 1][c]) {
                        rowFull = false;
                        break;
                    }
                }
                if (!rowFull) break;
                rowEnd++;
            }

            for (let r = row; r <= rowEnd; r++) {
                for (let c = col; c <= colEnd; c++) {
                    used[r][c] = true;
                }
            }

            const left = xs[col];
            const right = xs[colEnd + 1];
            const top = ys[row];
            const bottom = ys[rowEnd + 1];
            const w = right - left;
            const h = bottom - top;

            if (w >= minW && h >= minH) {
                rects.push({ left, top, width: w, height: h });
            }
        }
    }

    return rects;
}

function mergeGalleryFreeCellsHorizontalOnly(free, xs, ys, minW, minH) {
    const rows = free.length;

    const used = Array.from({ length: rows }, () => Array(cols).fill(false));

            while (

            ) {

            }

            for (let c = col; c <= colEnd; c++) {

            }

            const left = xs[col];
            const right = xs[colEnd + 1];
            const top = ys[row];
            const bottom = ys[row + 1];
            const w = right - left;
            const h = bottom - top;

            if (w >= minW && h >= minH) {

            }

    return rects;
}

function collectGlassBrickGridCells(free, xs, ys, minW, minH) {
    const rects = [];
    const rows = free.length;
    const cols = free[0]?.length || 0;

    for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
            if (!free[row][col]) continue;

            const left = xs[col];
            const right = xs[col + 1];
            const top = ys[row];
            const bottom = ys[row + 1];
            const w = right - left;
            const h = bottom - top;

            if (w >= minW && h >= minH) {

            }
        }
    }

    return rects;
}

function uniqueGlassBrickRects(rects) {
    const seen = new Set();

    return rects.filter((rect) => {
        const key = `${rect.left}|${rect.top}|${rect.width}|${rect.height}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
    });
}

function tryMergeGlassBrickPair(a, b) {
    const aRight = a.left + a.width;
    const aBottom = a.top + a.height;
    const bRight = b.left + b.width;
    const bBottom = b.top + b.height;

    const sameColumn =
        Math.abs(a.left - b.left) < 0.5 && Math.abs(a.width - b.width) < 0.5;
    const sameRow =
        Math.abs(a.top - b.top) < 0.5 && Math.abs(a.height - b.height) < 0.5;

    if (sameColumn && Math.abs(aBottom - b.top) < 0.5) {
        return {
            left: a.left,
            top: a.top,
            width: a.width,
            height: bBottom - a.top,
        };
    }

    if (sameColumn && Math.abs(bBottom - a.top) < 0.5) {
        return {
            left: a.left,
            top: b.top,
            width: a.width,
            height: aBottom - b.top,
        };
    }

    if (sameRow && Math.abs(aRight - b.left) < 0.5) {
        return {
            left: a.left,
            top: a.top,
            width: bRight - a.left,
            height: a.height,
        };
    }

    if (sameRow && Math.abs(bRight - a.left) < 0.5) {
        return {
            left: b.left,
            top: a.top,
            width: aRight - b.left,
            height: a.height,
        };
    }

    return null;
}

function mergeTouchingGlassBricks(rects) {
    let list = rects.slice();
    let changed = true;

    while (changed) {
        changed = false;

        for (let i = 0; i < list.length; i++) {
            for (let j = i + 1; j < list.length; j++) {
                const combined = tryMergeGlassBrickPair(list[i], list[j]);
                if (!combined) continue;

                list[i] = combined;
                list.splice(j, 1);
                changed = true;
                break;
            }

            if (changed) break;
        }
    }

    return list;
}

function getGalleryTopRowCeiling(placed, layerCount) {
    const topLayer = layerCount - 1;
    const topSlots = placed.filter((slot) => slot.layerIndex === topLayer);

    if (!topSlots.length) return Infinity;
    return Math.min(...topSlots.map((slot) => slot.top));
}

function getGalleryTopRowBandBottom(placed, layerCount) {
    const topLayer = layerCount - 1;
    const topSlots = placed.filter((slot) => slot.layerIndex === topLayer);

    if (!topSlots.length) return getGalleryTopRowCeiling(placed, layerCount);
    return Math.max(...topSlots.map((slot) => slot.bottom));
}

function fillerInTopRowBand(rect, placed, layerCount) {
    const ceiling = getGalleryTopRowCeiling(placed, layerCount);
    const bandBottom = getGalleryTopRowBandBottom(placed, layerCount);
    const rectBottom = rect.top + rect.height;

    return rect.top < bandBottom - 0.5 && rectBottom > ceiling - 0.5;
}

function clipGlassBrickRect(rect, placed, topPad, layerCount) {
    const topRowCeiling = getGalleryTopRowCeiling(placed, layerCount);
    const next = { ...rect };

    if (next.top < topRowCeiling - 0.5) {
        return null;
    }

    if (next.width < GLASS_BRICK_MIN_W || next.height < GLASS_BRICK_MIN_H) {
        return null;
    }

    if (fillerInTopRowBand(next, placed, layerCount) && next.width <= next.height + 0.5) {
        return null;
    }

    return next;
}

function buildGlassBrickCandidates(
    obstacles,
    sidePad,
    topPad,
    floorBottom,
    maxRight,
    cardPlaced,
    layerCount
) {
    const topRowCeiling = getGalleryTopRowCeiling(cardPlaced, layerCount);
    const xSet = new Set([sidePad, maxRight]);
    const ySet = new Set([topPad, floorBottom]);

    obstacles.forEach((slot) => {
        xSet.add(slot.left);
        xSet.add(slot.right);
        xSet.add(clamp(slot.left - GALLERY_GAP, sidePad, maxRight));
        xSet.add(clamp(slot.right + GALLERY_GAP, sidePad, maxRight));
        ySet.add(slot.top);
        ySet.add(slot.bottom);
        ySet.add(clamp(slot.top - GALLERY_GAP, topPad, floorBottom));
        ySet.add(clamp(slot.bottom + GALLERY_GAP, topPad, floorBottom));
    });

    if (Number.isFinite(topRowCeiling)) {
        ySet.add(topRowCeiling);
        ySet.add(clamp(topRowCeiling - GALLERY_GAP, topPad, floorBottom));
    }

    const xs = [...xSet].sort((a, b) => a - b);
    const ys = [...ySet].sort((a, b) => a - b);
    const cols = xs.length - 1;
    const rows = ys.length - 1;

    if (cols <= 0 || rows <= 0) return [];

    const free = Array.from({ length: rows }, () => Array(cols).fill(false));

    for (let row = 0; row < rows; row++) {
        const bandTop = ys[row];
        const bandBottom = ys[row + 1];

        for (let col = 0; col < cols; col++) {
            if (bandBottom <= topRowCeiling + 0.5) {
                free[row][col] = false;
                continue;
            }

            const left = xs[col];
            const right = xs[col + 1];
            free[row][col] = !galleryRectViolatesGap(
                left,
                bandTop,
                right,
                bandBottom,
                obstacles
            );
        }
    }

    const merged = mergeGalleryFreeCells(
        free,
        xs,
        ys,
        GLASS_BRICK_MIN_W,
        GLASS_BRICK_MIN_H
    );
    const rowBands = mergeGalleryFreeCellsHorizontalOnly(
        free,
        xs,
        ys,
        GLASS_BRICK_MIN_W,
        GLASS_BRICK_MIN_H
    );
    const gridCells = collectGlassBrickGridCells(
        free,
        xs,
        ys,
        GLASS_BRICK_MIN_W,
        GLASS_BRICK_MIN_H
    );

    return uniqueGlassBrickRects(
        mergeTouchingGlassBricks([...merged, ...rowBands, ...gridCells])
    )
        .map((rect) => clipGlassBrickRect(rect, cardPlaced, topPad, layerCount))
        .filter(Boolean)
        .sort((a, b) => b.width * b.height - a.width * a.height);
}

function findGalleryGlassBrickRects(
    placed,
    sidePad,
    topPad,
    floorBottom,
    maxRight,
    layerCount
) {
    const cardPlaced = placed.map((slot) => ({ ...slot }));
    const obstacles = cardPlaced.map((slot) => ({ ...slot }));
    const bricks = [];
    const maxPasses = 128;

    for (let pass = 0; pass < maxPasses; pass++) {
        const candidates = buildGlassBrickCandidates(
            obstacles,
            sidePad,
            topPad,
            floorBottom,
            maxRight,
            cardPlaced,
            layerCount
        );

        let placedAny = false;

        for (const rect of candidates) {
            const slot = gallerySlotFromRect(rect);
            if (
                galleryRectViolatesGap(
                    slot.left,
                    slot.top,
                    slot.right,
                    slot.bottom,
                    obstacles
                )
            ) {
                continue;
            }

            bricks.push(rect);
            obstacles.push(slot);
            placedAny = true;
        }

        if (!placedAny) break;
    }

    return bricks;
}

function getPlacedCardByPhoto(placed, photoNumber) {
    return placed.find((slot) => slot.cardIndex === photoNumber - 1) || null;
}

function computeGapRectBetweenCards(slotA, slotB, obstacles) {
    if (!slotA || !slotB) return null;

    const otherObstacles = obstacles.filter(
        (slot) =>
            slot.cardIndex !== slotA.cardIndex &&
            slot.cardIndex !== slotB.cardIndex
    );
    const attempts = [];
    const leftSlot = slotA.left <= slotB.left ? slotA : slotB;
    const rightSlot = leftSlot === slotA ? slotB : slotA;
    const shortSlot = slotA.bottom < slotB.bottom ? slotA : slotB;
    const tallSlot = shortSlot === slotA ? slotB : slotA;

    if (shortSlot !== tallSlot && tallSlot.top + GALLERY_GAP < shortSlot.top) {
        attempts.push({
            left: shortSlot.left,
            top: shortSlot.top,
            width: shortSlot.right - shortSlot.left,
            height: tallSlot.top - GALLERY_GAP - shortSlot.top,
        });
    }

    if (rightSlot.left >= leftSlot.right + GALLERY_GAP) {
        const overlapTop = Math.max(leftSlot.top, rightSlot.top);
        const overlapBottom = Math.min(leftSlot.bottom, rightSlot.bottom);

        if (overlapBottom > overlapTop) {
            attempts.push({
                left: leftSlot.right + GALLERY_GAP,
                top: overlapTop,
                width: rightSlot.left - leftSlot.right - GALLERY_GAP * 2,
                height: overlapBottom - overlapTop,
            });
        }

        attempts.push({
            left: leftSlot.right + GALLERY_GAP,
            top: Math.min(leftSlot.top, rightSlot.top),
            width: rightSlot.left - leftSlot.right - GALLERY_GAP * 2,
            height:
                Math.max(leftSlot.bottom, rightSlot.bottom) -
                Math.min(leftSlot.top, rightSlot.top),
        });
    }

    const topSlot = slotA.top <= slotB.top ? slotA : slotB;
    const bottomSlot = topSlot === slotA ? slotB : slotA;

    if (bottomSlot.top >= topSlot.bottom + GALLERY_GAP) {
        attempts.push({
            left: Math.min(topSlot.left, bottomSlot.left),
            top: topSlot.bottom + GALLERY_GAP,
            width:
                Math.max(topSlot.right, bottomSlot.right) -
                Math.min(topSlot.left, bottomSlot.left),
            height: bottomSlot.top - topSlot.bottom - GALLERY_GAP * 2,
        });
    }

    const valid = attempts.filter(
        (rect) => rect.width >= GLASS_BRICK_MIN_W && rect.height >= GLASS_BRICK_MIN_H
    );

    valid.sort((a, b) => b.width * b.height - a.width * a.height);

    for (const rect of valid) {
        const slot = gallerySlotFromRect(rect);
        if (
            !galleryRectViolatesGap(
                slot.left,
                slot.top,
                slot.right,
                slot.bottom,
                otherObstacles
            )
        ) {
            return rect;
        }
    }

    return null;
}

function extrudeGlassBrickRectToFloor(rect, obstacles, floorBottom) {
    const top = rect.top;
    const left = rect.left;
    const right = rect.left + rect.width;
    const currentBottom = top + rect.height;

    if (currentBottom >= floorBottom - 0.5) return rect;

    let maxBottom = floorBottom;

    obstacles.forEach((slot) => {
        if (left >= slot.right + GALLERY_GAP - 0.5) return;
        if (right <= slot.left - GALLERY_GAP + 0.5) return;
        if (slot.top <= top + 0.5) return;

        maxBottom = Math.min(maxBottom, slot.top - GALLERY_GAP);
    });

    const height = maxBottom - top;
    if (height < GLASS_BRICK_MIN_H || height <= rect.height + 0.5) return rect;

    return { ...rect, height };
}

function findManualGalleryGlassBrickRects(placed, obstacles) {
    const rects = [];

    GALLERY_MANUAL_GLASS_GAPS.forEach(([photoA, photoB]) => {
        const slotA = getPlacedCardByPhoto(placed, photoA);
        const slotB = getPlacedCardByPhoto(placed, photoB);
        const rect = computeGapRectBetweenCards(slotA, slotB, obstacles);

        if (!rect) return;

        rects.push({
            ...rect,
            manualKey: `${photoA}-${photoB}`,
        });
    });

    return rects;
}

function layoutGalleryGlassBricks(
    placed,
    sidePad,
    topPad,
    floorBottom,
    maxRight,
    layerCount
) {
    const inner = document.querySelector(".memory-gallery-inner");
    if (!inner) return;

    inner.querySelectorAll(".memory-gallery-glass-brick").forEach((el) => el.remove());

    const cardPlaced = placed.map((slot) => ({ ...slot }));
    const obstacles = cardPlaced.map((slot) => ({ ...slot }));
    const autoRects = findGalleryGlassBrickRects(
        cardPlaced,
        sidePad,
        topPad,
        floorBottom,
        maxRight,
        layerCount
    );
    let labelIndex = 0;

    const mountBrick = (rect, extra = {}) => {
        const extruded = extrudeGlassBrickRectToFloor(rect, obstacles, floorBottom);
        const label = galleryMarkerLetter(labelIndex);
        labelIndex += 1;

        const brick = document.createElement("div");
        brick.className = "memory-gallery-glass-brick";
        brick.setAttribute("aria-hidden", "true");
        brick.dataset.glassLabel = label;

        if (extra.manualKey) {
            brick.dataset.manualGap = extra.manualKey;
        }

        brick.dataset.brickW = String(Math.round(extruded.width));
        brick.dataset.brickH = String(Math.round(extruded.height));

        brick.style.left = `${extruded.left}px`;
        brick.style.top = `${extruded.top}px`;
        brick.style.width = `${extruded.width}px`;
        brick.style.height = `${extruded.height}px`;

        const img = document.createElement("img");
        img.className = "memory-gallery-filler-art";
        img.alt = "";
        img.decoding = "async";
        img.draggable = false;

        const applyFillerArt = () => {
            brick.classList.add("has-filler-art");
        };

        img.addEventListener("load", applyFillerArt);
        img.addEventListener("error", () => img.remove());
        img.src = galleryFillerArtSrc(label);
        brick.appendChild(img);

        if (img.complete) {
            if (img.naturalWidth > 0) {
                applyFillerArt();
            } else {
                img.remove();
            }
        }

        inner.appendChild(brick);
        obstacles.push(gallerySlotFromRect(extruded));
    };

    autoRects.forEach((rect) => {
        const label = galleryMarkerLetter(labelIndex);
        if (GALLERY_REMOVED_GLASS_LABELS.has(label)) {
            labelIndex += 1;
            return;
        }

        mountBrick(rect);
    });

    findManualGalleryGlassBrickRects(cardPlaced, obstacles).forEach((rect) => {
        const slot = gallerySlotFromRect(rect);
        if (
            galleryRectViolatesGap(
                slot.left,
                slot.top,
                slot.right,
                slot.bottom,
                obstacles
            )
        ) {
            return;
        }

        mountBrick(rect, { manualKey: rect.manualKey });
    });

    updateGalleryMarkupLabels();
}

function galleryFillerArtSrc(label) {
    return `${GALLERY_FILLER_ART_DIR}/filler${label}.png`;
}

let lockedCardLayoutMap = null;

function getLockedCardLayout(cardIndex) {
    if (!hasLockedGalleryLayout()) {
        return null;
    }

    if (!lockedCardLayoutMap) {
        lockedCardLayoutMap = new Map(
            GALLERY_LOCKED_LAYOUT.cards.map((entry) => [entry.cardIndex, entry])
        );
    }

    return lockedCardLayoutMap.get(cardIndex) || null;
}

function mountGalleryGlassBrick(inner, spec) {
    const brick = document.createElement("div");
    brick.className = "memory-gallery-glass-brick";
    brick.setAttribute("aria-hidden", "true");
    brick.dataset.glassLabel = spec.label;

    if (spec.manualGap) {
        brick.dataset.manualGap = spec.manualGap;
    }

    brick.dataset.brickW = String(Math.round(spec.width));
    brick.dataset.brickH = String(Math.round(spec.height));
    brick.style.left = `${spec.left}px`;
    brick.style.top = `${spec.top}px`;
    brick.style.width = `${spec.width}px`;
    brick.style.height = `${spec.height}px`;

    const img = document.createElement("img");
    img.className = "memory-gallery-filler-art";
    img.alt = "";
    img.decoding = "async";
    img.draggable = false;

    const applyFillerArt = () => {
        brick.classList.add("has-filler-art");
    };

    img.addEventListener("load", applyFillerArt);
    img.addEventListener("error", () => img.remove());
    img.src = galleryFillerArtSrc(spec.label);
    brick.appendChild(img);

    if (img.complete) {
        if (img.naturalWidth > 0) {
            applyFillerArt();
        } else {
            img.remove();
        }
    }

    inner.appendChild(brick);
}

function applyLockedCardLayout(card) {
    const cardIndex = parseInt(card.dataset.cardIndex || "0", 10);
    const layout = getLockedCardLayout(cardIndex);
    const photoWrap = card.querySelector(".memory-card-photo-wrap");

    if (!layout || !photoWrap) return false;

    card.dataset.heightScale = String(layout.heightScale);
    card.style.left = `${layout.left}px`;
    card.style.top = `${layout.top}px`;
    card.style.width = `${layout.width}px`;
    photoWrap.style.width = `${layout.photoW}px`;
    photoWrap.style.height = `${layout.photoH}px`;
    photoWrap.style.maxWidth = `${layout.photoW}px`;
    card.dataset.sized = "1";
    return true;
}

function applyLockedGalleryLayout() {
    if (!hasLockedGalleryLayout()) {
        return false;
    }

    const inner = document.querySelector(".memory-gallery-inner");
    if (!inner) return false;

    const locked = GALLERY_LOCKED_LAYOUT;
    galleryRowCount = locked.rowCount;
    galleryPhotoScale = locked.galleryPhotoScale;

    inner.querySelectorAll(".memory-card").forEach((card) => {
        applyLockedCardLayout(card);
    });

    inner.querySelectorAll(".memory-gallery-glass-brick").forEach((el) => el.remove());

    locked.bricks.forEach((brick) => {
        if (GALLERY_REMOVED_GLASS_LABELS.has(brick.label)) return;
        mountGalleryGlassBrick(inner, brick);
    });

    inner.style.width = `${locked.innerWidth}px`;
    measuredGalleryWidth = locked.innerWidth;
    updateGalleryMarkupLabels();
    return true;
}

function galleryMarkerLetter(index) {
    let n = index;
    let label = "";

    do {
        label = String.fromCharCode(65 + (n % 26)) + label;
        n = Math.floor(n / 26) - 1;
    } while (n >= 0);

    return label;
}

function ensureGalleryMarker(host, variantClass) {
    if (!host) return null;

    let marker = host.querySelector(".memory-gallery-marker");
    if (!marker) {
        marker = document.createElement("span");
        marker.className = `memory-gallery-marker ${variantClass}`;
        host.appendChild(marker);
    }

    marker.className = `memory-gallery-marker ${variantClass}`;
    return marker;
}

function ensureGalleryDimension(host) {
    if (!host) return null;

    let dim = host.querySelector(".memory-gallery-marker-dim");
    if (!dim) {
        dim = document.createElement("span");
        dim.className = "memory-gallery-marker-dim";
        host.appendChild(dim);
    }

    return dim;
}

function formatGalleryBrickSize(width, height) {
    return `${Math.round(width)} × ${Math.round(height)}`;
}

function updateGalleryMarkupLabels() {
    const inner = document.querySelector(".memory-gallery-inner");
    if (!inner) return;

    sortGalleryCardsByIndex([...inner.querySelectorAll(".memory-card")]).forEach(
        (card) => {
            const cardIndex = parseInt(card.dataset.cardIndex || "0", 10);
            const captionText = getGalleryCaptionText(card, cardIndex);
            card.classList.toggle("has-caption", Boolean(captionText));

            const marker = ensureGalleryMarker(
                card.querySelector(".memory-card-photo-wrap"),
                "is-photo"
            );
            if (marker) marker.textContent = String(cardIndex + 1);
        }
    );

    [...inner.querySelectorAll(".memory-gallery-glass-brick")].forEach(
        (brick, index) => {
            const label = brick.dataset.glassLabel || galleryMarkerLetter(index);
            const marker = ensureGalleryMarker(brick, "is-glass");
            const width = parseFloat(brick.dataset.brickW) || brick.offsetWidth;
            const height = parseFloat(brick.dataset.brickH) || brick.offsetHeight;
            const dim = ensureGalleryDimension(brick);

            if (marker) marker.textContent = label;
            if (dim) dim.textContent = formatGalleryBrickSize(width, height);
        }
    );
}

function layoutMemoryGalleryMasonry() {
    const inner = document.querySelector(".memory-gallery-inner");
    if (!inner) return;

    const cards = sortGalleryCardsByIndex(
        [...inner.querySelectorAll(".memory-card")]
    );
    if (!cards.length) return;

    const layerCount = getGalleryRowCount();
    const sidePad = parseFloat(getComputedStyle(inner).paddingLeft) || 32;
    const topPad = GALLERY_TOP_SPACE;
    const floorBottom = getAppViewport().height - 24;
    const placed = [];
    const layers = assignGalleryLayers(cards, layerCount);
    let maxRight = sidePad;

    // Bottom layer: exact 15px horizontal gaps, shared bottom edge.
    let cursorX = sidePad;
    sortGalleryCardsByIndex(layers[0]).forEach((card) => {
        const w = card.offsetWidth;
        const h = card.offsetHeight;
        if (w <= 0 || h <= 0) return;

        const left = cursorX;
        const top = floorBottom - h;

        const cardIndex = parseInt(card.dataset.cardIndex || "0", 10);

        card.style.left = `${left}px`;
        card.style.top = `${top}px`;

        placed.push({
            left,
            top,
            right: left + w,
            bottom: top + h,
            layerIndex: 0,
            cardIndex,
        });

        cursorX = left + w + GALLERY_GAP;
        maxRight = Math.max(maxRight, left + w);
    });

    // Upper layers: snap to 15px grid, nest 15px above irregular skyline below.
    for (let layerIndex = 1; layerIndex < layerCount; layerIndex++) {
        const brickOffset = layerIndex % 2 === 1 ? getGalleryBrickOffset() : 0;

        sortGalleryCardsByIndex(layers[layerIndex]).forEach((card) => {
            const w = card.offsetWidth;
            const h = card.offsetHeight;
            if (w <= 0 || h <= 0) return;

            const xCandidates = getSnappedXCandidates(placed, sidePad, brickOffset);
            const valid = [];

            xCandidates.forEach((left) => {
                if (!galleryHasSupportBelow(left, left + w, placed)) return;

                const top = galleryTopForSpan(left, left + w, h, placed, floorBottom);
                if (top < topPad - 0.5) return;
                if (galleryRectsOverlap(left, top, left + w, top + h, placed)) return;

                valid.push({ left, top });
            });

            let best = null;

            if (valid.length) {
                best = pickGalleryPlacement(valid);
            } else {
                for (const left of xCandidates) {
                    const top = galleryTopForSpan(left, left + w, h, placed, floorBottom);
                    if (top < topPad - 0.5) continue;
                    if (galleryRectsOverlap(left, top, left + w, top + h, placed)) {
                        continue;
                    }

                    if (!best || top > best.top) {
                        best = { left, top };
                    }
                }
            }

            if (!best) {
                const left = maxRight + GALLERY_GAP;
                const top = galleryTopForSpan(left, left + w, h, placed, floorBottom);
                if (
                    top >= topPad - 0.5 &&
                    !galleryRectsOverlap(left, top, left + w, top + h, placed)
                ) {
                    best = { left, top };
                }
            }

            if (!best) return;

            const cardIndex = parseInt(card.dataset.cardIndex || "0", 10);

            card.style.left = `${best.left}px`;
            card.style.top = `${best.top}px`;

            placed.push({
                left: best.left,
                top: best.top,
                right: best.left + w,
                bottom: best.top + h,
                layerIndex: layerIndex,
                cardIndex,
            });
            maxRight = Math.max(maxRight, best.left + w);
        });
    }

    inner.style.width = `${Math.ceil(maxRight + sidePad)}px`;
    layoutGalleryGlassBricks(
        placed,
        sidePad,
        topPad,
        floorBottom,
        maxRight,
        layerCount
    );
    updateGalleryMarkupLabels();
}

function getGalleryCardLayoutBounds(card) {
    const top = parseFloat(card.style.top);
    const height = card.offsetHeight;

    if (!Number.isFinite(top) || height <= 0) {
        return null;
    }

    return { top, bottom: top + height };
}

function finalizeGalleryLayout() {
    if (!document.querySelector(".memory-gallery-inner")) return;

    if (hasLockedGalleryLayout() && applyLockedGalleryLayout()) {
        remeasureGalleryWidth();
        updateSceneZoom();
        updateGalleryCardReveal();
        return;
    }

    fitGalleryVerticalBounds();
    remeasureGalleryWidth();
    updateSceneZoom();
    updateGalleryCardReveal();
}

function scheduleGalleryLayoutFinalize() {
    if (!galleryLayoutReady) return;

    if (window.__galleryFinalizeRaf) {
        cancelAnimationFrame(window.__galleryFinalizeRaf);
    }

    window.__galleryFinalizeRaf = requestAnimationFrame(() => {
        window.__galleryFinalizeRaf = null;
        finalizeGalleryLayout();
    });
}

function getGalleryCardSizeTier(cardIndex) {
    const r = gallerySeed(cardIndex + 43);
    if (r > 0.8) return 1.34;
    if (r > 0.55) return 1.16;
    return 1;
}

function applyGalleryCardSizeTier(card, cardIndex) {
    card.dataset.heightScale = String(getGalleryCardSizeTier(cardIndex));
}

function refitGalleryCards() {
    document.querySelectorAll(".memory-card").forEach((card) => {
        const img = card.querySelector(".memory-card-photo");
        const wrap = card.querySelector(".memory-card-photo-wrap");
        if (img && wrap) fitMemoryCardImage(card, img, wrap);
    });
}

function fitGalleryVerticalBounds() {
    const inner = document.querySelector(".memory-gallery-inner");
    if (!inner) return;

    const margin = GALLERY_TOP_SPACE;
    const vh = getAppViewport().height;
    const floorBottom = vh - 24;
    galleryPhotoScale = 1;

    for (let attempt = 0; attempt < 12; attempt++) {
        refitGalleryCards();
        layoutMemoryGalleryMasonry();

        let minTop = Infinity;
        let maxBottom = -Infinity;

        inner.querySelectorAll(".memory-card").forEach((card) => {
            const bounds = getGalleryCardLayoutBounds(card);
            if (!bounds) return;

            minTop = Math.min(minTop, bounds.top);
            maxBottom = Math.max(maxBottom, bounds.bottom);
        });

        if (!Number.isFinite(minTop)) return;

        const fitsTop = minTop >= margin - 1;
        const fitsBottom = maxBottom <= floorBottom + 1;
        if (fitsTop && fitsBottom) return;

        const contentH = Math.max(1, maxBottom - minTop);
        galleryPhotoScale *= clamp((vh - margin - 24) / contentH, 0.82, 0.98);
    }
}

function getMemoryCardMaxWidth() {
    const { width } = getAppViewport();
    return Math.min(320, width * 0.4);
}

function getMemoryCardInnerWidth() {
    return getMemoryCardMaxWidth() - 18;
}

function fitMemoryCardImage(card, img, photoWrap) {
    if (hasLockedGalleryLayout() && applyLockedCardLayout(card)) {
        return;
    }

    const heightScale = parseFloat(card.dataset.heightScale || "1");
    let photoH = getGalleryPhotoHeight() * heightScale;
    const maxPhotoW = getMemoryCardInnerWidth();
    let photoW;

    if (img.naturalWidth > 0 && img.naturalHeight > 0) {
        const minPhotoW = photoH * 0.58;
        const maxAspectW = photoH * 1.62;
        photoW = photoH * (img.naturalWidth / img.naturalHeight);
        photoW = Math.min(maxAspectW, Math.max(minPhotoW, photoW));
    } else {
        photoW = photoH * 0.78;
    }

    if (photoW > maxPhotoW) {
        photoW = maxPhotoW;
        photoH = photoW / Math.max(
            0.58,
            Math.min(
                1.62,
                img.naturalWidth > 0 && img.naturalHeight > 0
                    ? img.naturalWidth / img.naturalHeight
                    : 0.78
            )
        );
    }

    photoWrap.style.height = `${photoH}px`;
    photoWrap.style.width = `${photoW}px`;
    photoWrap.style.maxWidth = `${maxPhotoW}px`;
    card.style.width = `${photoW + 18}px`;
    card.dataset.sized = "1";
}

function remeasureGalleryWidth() {
    const inner = document.querySelector(".memory-gallery-inner");
    if (!inner) return;

    if (hasLockedGalleryLayout()) {
        measuredGalleryWidth = GALLERY_LOCKED_LAYOUT.innerWidth;
        inner.style.width = `${measuredGalleryWidth}px`;
    } else {
        measuredGalleryWidth = inner.offsetWidth;
    }

    applyWorldDimensions();
}

function scheduleGalleryRelayout() {
    if (!galleryLayoutReady) return;
    if (galleryRelayoutRaf) return;
    galleryRelayoutRaf = requestAnimationFrame(() => {
        galleryRelayoutRaf = null;
        finalizeGalleryLayout();
    });
}

function settleGalleryImage(img) {
    if (hasLockedGalleryLayout()) return;
    if (img.dataset.gallerySettled === "1") return;
    img.dataset.gallerySettled = "1";
    galleryImagesPending = Math.max(0, galleryImagesPending - 1);

    if (galleryImagesPending === 0) {
        galleryLayoutReady = true;
        scheduleGalleryRelayout();
    }
}

function bindMemoryCardImage(card, img, photoWrap) {
    const applySize = () => {
        fitMemoryCardImage(card, img, photoWrap);
        if (!hasLockedGalleryLayout()) {
            scheduleGalleryRelayout();
        }
    };

    if (hasLockedGalleryLayout() && applyLockedCardLayout(card)) {
        return;
    }

    img.addEventListener("load", () => {
        settleGalleryImage(img);
        applySize();
    });
    img.addEventListener("error", () => {
        img.removeAttribute("src");
        photoWrap.style.background =
            "linear-gradient(145deg, rgba(255,120,200,0.12), rgba(40,30,50,0.35))";
        settleGalleryImage(img);
        applySize();
    });

    fitMemoryCardImage(card, img, photoWrap);

    if (img.complete) {
        if (img.naturalWidth > 0) {
            settleGalleryImage(img);
            applySize();
        } else {
            img.removeAttribute("src");
            photoWrap.style.background =
                "linear-gradient(145deg, rgba(255,120,200,0.12), rgba(40,30,50,0.35))";
            settleGalleryImage(img);
            applySize();
        }
    }
}

function getFavoritesGap() {

}

function getFavoritesWidth() {

function getPlaylistGap() {

function getPlaylistWidth() {

function getFinaleGap() {

function getFinaleWidth() {

function getFinaleGatesWidth() {
    const panelW = getFinaleWidth();
    return Math.min(panelW * FINALE_GATES_WIDTH_RATIO, FINALE_GATES_MAX_PX);
}

function getFinaleSecondGateLayoutRight() {
    const panelW = getFinaleWidth();
    const gatesW = getFinaleGatesWidth();
    const gatesLeftInPanel = (panelW - gatesW) / 2 + FINALE_GATES_SHIFT_X;
    const calculated = getFinalePanelLeft() + gatesLeftInPanel + gatesW;
    const finaleStart = getFinalePanelLeft();

    const gate = document.querySelector(".finale-gate:last-child");
    if (gate?.isConnected) {
        const layout = screenRectToLayout(gate.getBoundingClientRect());
        if (
            Number.isFinite(layout.right) &&
            layout.right > finaleStart + 48
        ) {
            return layout.right;
        }
    }

    return calculated;
}

function getPanScrollWidth() {
    return (
        getGalleryWidth() +
        getFavoritesGap() +
        getFavoritesWidth() +
        getPlaylistGap() +
        getPlaylistWidth() +
        getFinaleGap() +
        getFinaleWidth()
    );
}

function getVisibleLayoutWidth() {
    return getScreenViewport().width / getSceneZoom();
}

function getSceneViewBounds() {
    const zoom = getSceneZoom();
    const screenW = getScreenViewport().width;
    const viewLeft = -scenePanX / zoom;
    const viewRight = (screenW - scenePanX) / zoom;
    return {
        viewLeft,
        viewRight,
        viewCenter: (viewLeft + viewRight) / 2,
        viewWidth: viewRight - viewLeft,
    };
}

function getScenePanMax() {
    const zoom = getSceneZoom();
    const viewWidth = getVisibleLayoutWidth();
    const worldW = getWorldWidth();
    const maxViewLeftByWorld = Math.max(0, worldW - viewWidth);
    const gateRight = getFinaleSecondGateLayoutRight();
    const maxViewLeftByGate = Math.max(
        0,
        gateRight - FINALE_PAN_STOP_BEFORE_SECOND_GATE - viewWidth
    );
    const maxViewLeft = Math.min(maxViewLeftByWorld, maxViewLeftByGate);
    return maxViewLeft * zoom;
}

function getWorldWidth() {
    return getAppViewport().width + getPanScrollWidth();
}

function getFinalePanelLeft() {
    return (
        getAppViewport().width +
        getGalleryWidth() +

        getPlaylistWidth() +

function isPointInFinaleSection(layoutX) {

function mountFavoritesArcPhotos() {
    const host = document.querySelector(".favorites-arc-photos");
    if (!host || host.dataset.ready === "1") return;

    const root = document.querySelector(".favorites-arc-root");
    if (root) {
        root.setAttribute(
            "transform",
            `translate(${FAVORITES_ARC_CENTER_X} ${FAVORITES_ARC_CENTER_Y})`
        );
    }

    const circle = document.querySelector(".favorites-arc-ring circle");
    if (circle) {
        circle.setAttribute("r", String(FAVORITES_ARC_RADIUS));
    }

    const svgNS = "http://www.w3.org/2000/svg";
    const imageX = -FAVORITES_ARC_PHOTO_W / 2;
    const imageY = -FAVORITES_ARC_PHOTO_H;
    const angleStep = 360 / FAVORITES_ARC_PHOTO_COUNT;

    for (let i = 0; i < FAVORITES_ARC_PHOTO_COUNT; i++) {
        const deg = 90 + i * angleStep;
        const rad = (deg * Math.PI) / 180;
        const x = FAVORITES_ARC_RADIUS * Math.cos(rad);
        const y = -FAVORITES_ARC_RADIUS * Math.sin(rad);
        const rot = 90 - deg;
        const clipId = `favorites-arc-photo-clip-${i}`;

        const group = document.createElementNS(svgNS, "g");
        group.classList.add("favorites-arc-photo");
        group.setAttribute("transform", `translate(${x} ${y}) rotate(${rot})`);

        const defs = document.createElementNS(svgNS, "defs");
        const clipPath = document.createElementNS(svgNS, "clipPath");
        clipPath.setAttribute("id", clipId);
        const clipRect = document.createElementNS(svgNS, "rect");
        clipRect.setAttribute("x", String(imageX));
        clipRect.setAttribute("y", String(imageY));
        clipRect.setAttribute("width", String(FAVORITES_ARC_PHOTO_W));
        clipRect.setAttribute("height", String(FAVORITES_ARC_PHOTO_H));
        clipRect.setAttribute("rx", "9");
        clipPath.appendChild(clipRect);
        defs.appendChild(clipPath);
        group.appendChild(defs);

        const image = document.createElementNS(svgNS, "image");
        image.classList.add("favorites-arc-photo-image");
        image.setAttribute("href", favoritesPhotoboothSrc(i + 1));
        image.setAttribute("x", String(imageX));
        image.setAttribute("y", String(imageY));
        image.setAttribute("width", String(FAVORITES_ARC_PHOTO_W));
        image.setAttribute("height", String(FAVORITES_ARC_PHOTO_H));
        image.setAttribute("preserveAspectRatio", "xMidYMax meet");
        image.setAttribute("clip-path", `url(#${clipId})`);
        image.addEventListener("error", () => {
            image.removeAttribute("href");
        });
        group.appendChild(image);

        host.appendChild(group);
    }

    host.dataset.ready = "1";
}

function getScreenViewport() {
    const vv = window.visualViewport;
    return {
        width: vv?.width ?? window.innerWidth,
        height: vv?.height ?? window.innerHeight,
    };
}

function hasLockedGalleryLayout() {
    return (
        GALLERY_USE_LOCKED_LAYOUT &&
        typeof GALLERY_LOCKED_LAYOUT !== "undefined" &&
        Array.isArray(GALLERY_LOCKED_LAYOUT.cards)
    );
}

function getSceneZoom() {
    return (
        parseFloat(
            getComputedStyle(document.documentElement).getPropertyValue("--scene-zoom")
        ) || 1
    );
}

function screenPointToLayout(clientX, clientY) {
    const zoom = getSceneZoom();
    return {
        x: (clientX - getScenePanX()) / zoom,
        y: clientY / zoom,
    };
}

function screenRectToLayout(rect) {
    const zoom = getSceneZoom();
    const pan = getScenePanX();
    return {
        left: (rect.left - pan) / zoom,
        right: (rect.right - pan) / zoom,
        top: rect.top / zoom,
        bottom: rect.bottom / zoom,
        width: rect.width / zoom,
        height: rect.height / zoom,
    };
}

function updateSceneZoom() {
    if (!appViewport) return;

    const { height } = getScreenViewport();
    const zoom = clamp(height / appViewport.height, 0.25, 4);
    document.documentElement.style.setProperty("--scene-zoom", String(zoom));

    if (typeof updateTitlePinPosition === "function") {
        updateTitlePinPosition();
    }
    if (typeof setScenePanX === "function" && typeof scenePanX === "number") {
        setScenePanX(scenePanX);
    }
}

function lockAppViewport() {
    if (appViewport) return appViewport;

    if (hasLockedGalleryLayout()) {
        appViewport = {
            width: GALLERY_LOCKED_LAYOUT.viewport.width,
            height: GALLERY_LOCKED_LAYOUT.viewport.height,
        };
    } else {
        const screen = getScreenViewport();
        appViewport = {
            width: screen.width,
            height: screen.height,
        };
    }

    const root = document.documentElement;
    const sidePad =
        hasLockedGalleryLayout() && GALLERY_LOCKED_LAYOUT.cards[0]
            ? GALLERY_LOCKED_LAYOUT.cards[0].left
            : clamp(appViewport.width * 0.04, 32, 56);
    root.style.setProperty("--app-w", `${appViewport.width}px`);
    root.style.setProperty("--app-h", `${appViewport.height}px`);
    root.style.setProperty("--gallery-side-pad", `${sidePad}px`);
    root.style.setProperty("--scene-zoom", "1");
    root.classList.add("viewport-locked");
    updateWorldLayout();
    updateSceneZoom();

    if (!window.__sceneZoomReady) {
        window.__sceneZoomReady = true;
        window.visualViewport?.addEventListener("resize", updateSceneZoom);
        window.addEventListener("resize", updateSceneZoom);
        window.addEventListener("orientationchange", updateSceneZoom);
    }

    return appViewport;
}

function getAppViewport() {
    return appViewport || lockAppViewport();
}

function initScene() {
    if (window.__sceneInitialized) return;
    window.__sceneInitialized = true;

    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            lockAppViewport();
            mountMemoryGallery();
            mountFavoritesArcPhotos();
            applyWorldDimensions();
            syncFinaleGardenSvgs();
            updateTitlePinPosition();
            updatePanSectionTitles();

            if (document.body.classList.contains("letter-focus")) {

}

function wait(ms) {

}

function parseDurationMs(value, fallback = 2200) {
    const n = parseFloat(String(value || ""));
    return Number.isFinite(n) && n > 0 ? n : fallback;
}

function waitForCssAnimation(target, animationName, durationMs) {
    return new Promise((resolve) => {
        let settled = false;
        const done = () => {
            if (settled) return;
            settled = true;
            resolve();
        };

        if (target) {
            target.addEventListener("animationend", (e) => {
                if (animationName && e.animationName !== animationName) return;
                done();
            });
        }

        setTimeout(done, durationMs + 80);
    });
}

function forceReflow(el) {
    if (el instanceof SVGElement) {
        el.getBBox();
    } else {
        void el.offsetWidth;
    }
}

function cssRetract(el, className) {
    const computed = getComputedStyle(el);
    const transform =
        computed.transform && computed.transform !== "none"
            ? computed.transform
            : className === "retract-bloom-y" || className === "retract-grass"
              ? "scaleY(1)"
              : "scale(1)";

    el.style.animation = "none";
    el.style.transform = transform;

    forceReflow(el);
    el.classList.add(className);
}

function parseAnimDelay(el) {
    const delay = el.style.animationDelay || "";
    return parseFloat(delay) || 0;
}

function staggerRetractLeaves(group) {
    const leaves = Array.from(
        group.querySelectorAll(".leaf, .heavy-leaf, .larkspur-leaf, .tulip-blade")
    );

    leaves.sort((a, b) => parseAnimDelay(b) - parseAnimDelay(a));

    let staggerAt = 0;

    return new Promise((resolve) => {
        if (!leaves.length) {
            resolve();
            return;
        }

        leaves.forEach((el, i) => {
            const isLarkspur = el.classList.contains("larkspur-leaf");
            const className = el.classList.contains("tulip-blade")
                ? "retract-bloom-y"
                : isLarkspur
                  ? "retract-larkspur-leaf"
                  : "retract-leaf";
            const duration = el.classList.contains("tulip-blade")
                ? 900
                : isLarkspur
                  ? 100
                  : 650;
            const stagger = isLarkspur ? 40 : 130;
            const startAt = staggerAt;

            setTimeout(() => {
                cssRetract(el, className);

                if (i === leaves.length - 1) {
                    setTimeout(resolve, duration);
                }
            }, startAt);

            staggerAt += stagger;
        });
    });
}

function staggerRetractGrass(group) {
    const clumps = Array.from(group.querySelectorAll(".grass-clump"));
    clumps.sort((a, b) => parseAnimDelay(b) - parseAnimDelay(a));
    const grassDuration = 650;
    const stagger = 160;

    return new Promise((resolve) => {
        if (!clumps.length) {
            resolve();
            return;
        }

        clumps.forEach((el, i) => {
            setTimeout(() => {
                cssRetract(el, "retract-grass");

                if (i === clumps.length - 1) {
                    setTimeout(resolve, grassDuration);
                }
            }, i * stagger);
        });
    });
}

function stopSway(group) {

        ".rose-sway, .desert-sway, .tulip-sway, .larkspur-sway, .daisy-sway"
    ).forEach((el) => {

    });
}

function animateScaleFromCenter(el, cx, cy, from, to, duration) {
    return new Promise((resolve) => {
        const start = performance.now();

        function frame(now) {
            const t = Math.min(1, (now - start) / duration);
            const eased = Math.pow(t, 3);
            const scale = from + (to - from) * eased;
            el.setAttribute(
                "transform",
                `translate(${cx}, ${cy}) scale(${scale}) translate(${-cx}, ${-cy})`
            );
            if (t < 1) requestAnimationFrame(frame);
            else resolve();
        }

        requestAnimationFrame(frame);
    });
}

function fadeSVGElement(el, duration) {
    return new Promise((resolve) => {
        if (!el) {
            resolve();
            return;
        }

        const start = performance.now();

        function frame(now) {
            const t = Math.min(1, (now - start) / duration);
            el.style.opacity = String(1 - easeInOut(t));
            if (t < 1) requestAnimationFrame(frame);
            else resolve();
        }

        requestAnimationFrame(frame);
    });
}

function retractCircle(circle, duration) {
    return new Promise((resolve) => {
        const targetR = parseFloat(circle.getAttribute("r")) || 0;
        const targetRx = parseFloat(circle.getAttribute("rx"));
        const targetRy = parseFloat(circle.getAttribute("ry"));
        const start = performance.now();

        function frame(now) {
            const t = Math.min(1, (now - start) / duration);
            const eased = Math.pow(t, 3);
            const scale = 1 - eased;

            if (!Number.isNaN(targetR)) {
                circle.setAttribute("r", targetR * scale);
            }
            if (!Number.isNaN(targetRx)) {
                circle.setAttribute("rx", targetRx * scale);
            }
            if (!Number.isNaN(targetRy)) {
                circle.setAttribute("ry", targetRy * scale);
            }

            if (t < 1) requestAnimationFrame(frame);
            else resolve();
        }

        requestAnimationFrame(frame);
    });
}

function retractStem(path) {
    return new Promise((resolve) => {
        const length =
            parseFloat(path.style.getPropertyValue("--length")) ||
            path.getTotalLength();
        const duration = parseDurationMs(path.style.getPropertyValue("--duration"));

        path.style.strokeDasharray = `${length}`;
        path.style.strokeDashoffset = "0";
        path.style.animation = "none";
        path.style.opacity = "1";
        forceReflow(path);

        const start = performance.now();

        function frame(now) {
            const t = Math.min(1, (now - start) / duration);
            path.style.strokeDashoffset = `${easeInOut(t) * length}`;
            if (t < 1) requestAnimationFrame(frame);
            else resolve();
        }

        requestAnimationFrame(frame);
    });
}

async function retractCenterBloom(sway, cx, cy) {
    const jobs = [];
    const back = sway.children[0];

    if (back) {
        Array.from(back.children).forEach((petalGroup) => {
            jobs.push(animateScaleFromCenter(petalGroup, cx, cy, 1, 0, 800));
        });
    }

    const front = sway.children[1];
    const center = front?.querySelector("circle");
    if (center) {
        jobs.push(retractCircle(center, 500));
    }

    await Promise.all(jobs);
}

async function removePlant(plant) {
    if (!plant || plant.removing) return;

    plant.removing = true;
    plant.sporeCancels.forEach((cancel) => cancel());

    const group = plant.group;
    stopSway(group);

    group.querySelectorAll(".petal, .tulip-petal").forEach((el) => {
        cssRetract(el, "retract-bloom-y");
    });

    group.querySelectorAll(".larkspur-bloom").forEach((el) => {
        cssRetract(el, "retract-bloom");
    });

    group.querySelectorAll(".rose-sway ellipse").forEach((el) => {
        retractCircle(el, 500);
    });

    const centerJobs = [];
    group.querySelectorAll(".desert-sway").forEach((sway) => {
        centerJobs.push(
            retractCenterBloom(sway, DESERT_CENTER.cx, DESERT_CENTER.cy)
        );
    });
    group.querySelectorAll(".daisy-sway").forEach((sway) => {
        centerJobs.push(
            retractCenterBloom(sway, DAISY_CENTER.cx, DAISY_CENTER.cy)
        );
    });

    await Promise.all([wait(900), ...centerJobs]);

    await staggerRetractLeaves(group);

    const stems = Array.from(group.querySelectorAll(".stem"));
    await Promise.all(stems.map(retractStem));

    await staggerRetractGrass(group);

    group.remove();
}

function unregisterPlant(plant) {
    const index = plantRegistry.indexOf(plant);
    if (index >= 0) plantRegistry.splice(index, 1);
}

function cullOffScreenPlants() {
    if (document.body.dataset.gardenUnlocked !== "1") return;

    const margin = 36;
    const viewW = getAppViewport().width;

    for (let i = plantRegistry.length - 1; i >= 0; i--) {
        const plant = plantRegistry[i];
        if (!plant?.group?.isConnected || plant.removing) continue;

        const rect = plant.group.getBoundingClientRect();
        const offScreen = rect.right < -margin || rect.left > viewW + margin;

        if (offScreen) {
            unregisterPlant(plant);
            void removePlant(plant);
        }
    }
}

let cullPlantsRaf = null;

function scheduleCullOffScreenPlants() {
    if (cullPlantsRaf) return;
    cullPlantsRaf = requestAnimationFrame(() => {
        cullPlantsRaf = null;
        cullOffScreenPlants();
    });
}

function registerPlant(plant) {
    plantRegistry.push(plant);
    if (plantRegistry.length > MAX_PLANTS) {
        void removePlant(plantRegistry.shift());
    }
}

function beginPlant(baseX, baseY, targetSvg = svg) {
    const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
    group.classList.add("plant");
    const plant = {
        group,
        sporeCancels: [],
        baseX,
        baseY,
    };
    targetSvg.appendChild(group);
    registerPlant(plant);
    currentPlant = plant;
}

function endPlant() {
    currentPlant = null;
}

function getFlowerScale(defaultScale) {
    return cardFlowerContext ? defaultScale * cardFlowerContext.scale : defaultScale;
}

function beginCardPlant(svg, baseX, baseY) {
    const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
    group.classList.add("plant", "card-side-plant");
    currentPlant = {
        group,
        sporeCancels: [],
        baseX,
        baseY,
    };
    cardFlowerContext = { scale: 1 };
    svg.appendChild(group);
}

function endCardPlant() {
    currentPlant = null;
    cardFlowerContext = null;
}

function pickFlowerType() {
    const roll = Math.random();
    if (roll < 0.225) return "rose";
    if (roll < 0.45) return "desert";
    if (roll < 0.675) return "tulip";
    if (roll < 0.75) return "larkspur";
    return "daisy";
}

function getStemAngleFromCurve(y, controlY, bendAmount) {
    return Math.atan2(y - controlY, -bendAmount) * 180 / Math.PI;
}

function animateCalyx(ellipse, stemDuration) {
    const targetRx = ROSE_CALYX.rx;
    const targetRy = ROSE_CALYX.ry;
    const growMs = 500;

    ellipse.setAttribute("rx", 0);
    ellipse.setAttribute("ry", 0);

    setTimeout(() => {
        const start = performance.now();

        function frame(now) {
            const t = Math.min(1, (now - start) / growMs);
            const eased = 1 - Math.pow(1 - t, 3);
            ellipse.setAttribute("rx", targetRx * eased);
            ellipse.setAttribute("ry", targetRy * eased);
            if (t < 1) requestAnimationFrame(frame);
        }

        requestAnimationFrame(frame);
    }, stemDuration);
}

function growCircleFromZero(circle, targetR, growMs, onComplete) {
    circle.setAttribute("r", 0);

    const start = performance.now();

    function frame(now) {
        const t = Math.min(1, (now - start) / growMs);
        const eased = 1 - Math.pow(1 - t, 3);
        circle.setAttribute("r", targetR * eased);
        if (t < 1) requestAnimationFrame(frame);
        else if (onComplete) onComplete();
    }

    requestAnimationFrame(frame);
}

function animatePetalFromCenter(petalGroup, cx, cy, delay) {
    const growMs = 900;

    const setScale = (scale) => {
        petalGroup.setAttribute(
            "transform",
            `translate(${cx}, ${cy}) scale(${scale}) translate(${-cx}, ${-cy})`
        );
    };

    setScale(0);

    setTimeout(() => {
        const start = performance.now();

        function frame(now) {
            const t = Math.min(1, (now - start) / growMs);
            const eased = 1 - Math.pow(1 - t, 3);
            setScale(eased);
            if (t < 1) requestAnimationFrame(frame);
        }

        requestAnimationFrame(frame);
    }, delay);
}
